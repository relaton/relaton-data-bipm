abstract:
- language: en
  script: Latn
  content: "<p>Significant improvement in signal-to-noise ratios is achieved with
    new, low pressure CO2 stabilization cells external to the lasers. A time domain
    fractional frequency stability of σy(τ) ≃ 6 × 10-12 τ-1/2 was measured with independently
    line-center locked 1.5 metre grating controlled CO2 lasers. Accurate, repeatable
    determination of pressure shift is demonstrated.</p>"
