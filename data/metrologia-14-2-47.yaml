abstract:
- language: en
  script: Latn
  content: "<p>Absolute wavelength measurements of the 127I2 stabilized He-Ne laser
    of NRLM have been made by comparison with the 86Kr primary standard using a pressure
    scanning Fabry-Perot interferometer. Vacuum wavelength value is given for the
    i-component of 127I2. The wavelength value obtained is 632991399.95 fm with a
    standard error of 3 × 10-9. This agrees with the value recommended by CCDM(632991399
    fm) within 2 × 10-9.</p>"
