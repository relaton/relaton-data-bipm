abstract:
- language: en
  script: Latn
  content: "<p>A noise thermometer has been developed, which operates by the correlation
    method suggested by van der Ziel. The temperature of the liquid 4He at seven different
    vapour pressures was measured with an accuracy of about 10-4. Within 0.4 mK the
    noise temperatures coincide with the new T76-scale</p>"
