abstract:
- language: en
  script: Latn
  content: "<p>In much primary pressure-volume and acoustic thermometry in the range
    2.5-27 K appreciable benefit could be expected from smoothing the slopes of the
    isotherms and refitting them with the smoothed slopes. Since the isotherms are
    generally few in number, it is desirable to find a realistic form for the temperature
    dependence of the corresponding virial coefficients which has only two or three
    undetermined coefficients. The commonly suggested form, <em>a + bT </em><sup>−1</sup>
    + δ(<em>T</em>), δ(<em>T</em>) being a small single term adjustment, is investigated
    on the basis of the direct and exchange <sup>4</sup>He phase shift sums, <em>G</em><sub>+</sub>(<em>k</em>)
    and <em>G</em><sub>−</sub>(<em>k</em>), given by Boyd, Larsen and Kilpatrick (BLK).
    It is shown that only a limited region of the <em>G</em><sub>+</sub>(<em>k</em>)
    curve contributes significantly to the value of <em>B</em>(<em>T</em>) for most
    of the range of interest and that this has a particularly simple form leading
    to the terms <em>a + bT </em><sup>−1</sup>. But, as BLK found, this is of insufficient
    accuracy to represent <em>B</em>(<em>T</em>) over the full range. In order to
    extend its usefulness two small but significant calculated corrections are proposed,
    one to allow for the effect of the exchange phase shift sum <em>G</em><sub>−</sub>(<em>k</em>)
    and one to compensate for ignoring low momentum features of the direct sum <em>G</em><sub>+</sub>(<em>k</em>).
    A plausible, but somewhat arbitrary, form for δ(<em>T</em>), <em>cT </em><sup>−1/2</sup>,
    is also deduced from the <em>G</em><sub>+</sub>(<em>k</em>) curve, though, having
    inserted the two corrections, it makes only a small contribution to the smoothing
    procedure. From these considerations recommendations for smoothing thermometry
    isotherm slopes are deduced and assessed numerically. It is found that they can
    considerably enhance the quality of all but the finest work. They also facilitate
    the derivation of acoustic virial coefficients from pressure-volume virial coefficients
    and vice versa. The indirect dependence of the recommendations on the obsolete
    Lennard-Jones potential on which BLK based their phase shifts is argued to be
    inconsequential.</p>"
