abstract:
- language: en
  script: Latn
  content: "<p>The Second International Conference on Precision Measurement and Fundamental
    Constants will be held 8–12 June 1981 at the National Bureau of Standards (NBS),
    Gaithersburg, Maryland. This Conference will be similar to that held at NBS Gaithersburg
    in August 1970: It will provide an international forum for those engaged in experimental
    and theoretical research on precision measurements relating to the fundamental
    physical constants, and on the testing of related fundamental theory. The topics
    of interest include:\n \nIt is expected that new results reported at the Conference
    will be considered for inclusion in the next least-squares adjustment of the constants
    which is being carried out under the auspices of the CODATA Task Group on Fundamental
    Constants. This adjustment should be completed by the end of 1981 and the resulting
    set of recommended values officially adopted for international use by CODATA in
    early 1982.</p><p>Those interested in the Conference should communicate with Dr
    B N Taylor, National Bureau of Standards, Building 220, Room B 258, Washington,
    DC 20234, USA.\n</p>"
