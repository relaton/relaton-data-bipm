abstract:
- language: en
  script: Latn
  content: "<p>A new interferometric measurement of the caesium D2 resonance line
    wavenumber has been performed. The source is a diode laser stabilized on the fluorescence
    light of a caesium beam. Its wave number is measured with an improved interferometric
    wavemeter (lambdameter). The σD wavenumber is determined with an accuracy of 3.5
    × 10-8.</p>"
