abstract:
- language: en
  script: Latn
  content: "<p>A preliminary determination of h/mn (h = Planck constant, mn = neutron
    mass) with a relative uncertainty of about 10-5 has been carried out at the high-flux
    reactor of the Institut Laue-Langevin in Grenoble. Further improvement of the
    experimental set-up will reduce the uncertainty by an order of magnitude.</p>"
