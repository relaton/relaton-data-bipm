abstract:
- language: en
  script: Latn
  content: "<p>Expressions for the virial coefficients <em>B</em>(<em>T</em>) and
    <em>C</em>(<em>T</em>) of <sup>4</sup>He gas between 2.6 K and 300 K have been
    derived from a surface fit to low-temperature gas-thermometry data constrained
    at higher temperatures. The resulting expressions are shown to be in agreement
    with various experimental data over the whole temperature range within the accuracy
    of the data, and also with present theoretical calculations of <em>B</em>(<em>T</em>).</p>"
