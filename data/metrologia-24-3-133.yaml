abstract:
- language: en
  script: Latn
  content: "<p>Advances towards the realization of an absolute frequency standard
    in the submillimetre region are reported. The 3P1 ↔ 3P0, Δm = 0 fine-structure
    transition in the metastable triplet of 24Mg has been observed in an atomic beam
    with a Ramsey-type interrogation technique. Its frequency, measured with an accuracy
    of ± 3 × 10-11 with respect to a Cs standard, turned out to be ν0 = (601 277 157
    860 ± 20) Hz.</p>"
