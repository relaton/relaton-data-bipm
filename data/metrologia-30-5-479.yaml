abstract:
- language: en
  script: Latn
  content: "<p>The estimation of individual instabilities of <em>N</em> clocks, when
    only differences of clock readings are available, is examined without any a priori
    assumption about the lack of correlation between clocks. The instability of the
    <em>N</em> clocks is described by the <em>N × N</em> covariance matrix <em>R</em>
    but only the (<em>N</em> - 1) × (<em>N</em> - 1) covariance matrix <em>S</em>
    of the differences referred to the <em>N</em>-th clock may be estimated directly
    from measurements. The estimation of <em>R</em> from <em>S</em> is not unique
    but the solution domain is limited by the positive definiteness of <em>R</em>.
    The features of this domain are analysed and the conditions for the validity of
    the uncorrelation hypothesis are established. The modifications of the solution
    domain, when the number <em>N</em> of compared clocks increases, is examined showing
    that each added clock can reduce the domain and therefore the arbitrariness in
    estimating <em>R</em>. Examples with some experimental data illustrate the capabilities
    of this approach.</p>"
