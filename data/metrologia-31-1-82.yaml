    <p>17 to 21 October 1994, Hong Kong Convention and Exhibition Centre</p><p>The International Laboratory Accreditation Conference (ILAC) is an informal international forum for discussion of issues related to laboratory accreditation. Conferences are held biennially at different locations around the world, and the 1994 conference will be held in Hong Kong from 17 to 21 October. Some three hundred delegates from forty countries are expected.</p><p>ILAC was established in 1977 by the heads of several national testing authorities. Its objectives are:
     </p><p>Registration</p><p>It is expected that the Hong Kong conference will be at least as popular as recent conferences in Ottawa (1992), Turin (1990) and Auckland (1988), so early registration is advisable. For further details write to the ILAC Secretariat, c/o 36th Floor, Immigration Tower, 7 Gloucester Road, Wanchai, Hong Kong, or fax (852) 824 1302.</p>
