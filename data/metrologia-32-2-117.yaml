abstract:
- language: en
  script: Latn
  content: "<p>The quotient h/mn (h Planck constant, mn neutron mass) has been measured
    with a relative uncertainty of 7,7 × 10-8. The result is h/mn = 3,956 033 320
    (302) × 10-7 m2s-1. To obtain it, a beam of neutrons with an identical and well-known
    wavelength was produced by Bragg reflection in a perfect silicon crystal; the
    velocity of the neutrons was measured using a very precise time-of-flight method.
    According to the de Broglie equation, h/mn is equal to the product of these two
    quantities. From h/mn the value of the fine-structure constant α can be derived.
    The measured value of h/mn leads to α-1 = 137,03601082 (524) (relative uncertainty
    3,9 × 10-8). The experiment was carried out at the high-flux reactor of the Institut
    Laue-Langevin in Grenoble, France.</p>"
