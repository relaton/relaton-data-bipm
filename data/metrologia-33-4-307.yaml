abstract:
- language: en
  script: Latn
  content: "<p>We have measured the vapour pressure of caesium over the temperature
    range 370 °C to 660 °C using a pressure-controlled heat pipe. The equation log
    (<em>p</em>/Pa) = <em>a</em> +<em> b</em>/<em>T</em> + <em>c</em> log(<em>T</em>/K)
    + <em>dT</em> + <em>eT</em><sup>2</sup> with the coefficients  <em>a</em> = 34,573
    234, <em>b</em> = -4979,5799 K, <em>c</em>= -9,323 424 7, <em>d</em> = 4,473 313
    2 × 10<sup>-3</sup> K<sup>-1</sup> and <em>e</em> = -8,684 092 × 10<sup>-7</sup>
    K<sup>-2</sup> fits the data to within ±8 mK over the entire range. In addition,
    the non-uniqueness of the ITS-90 appears to be less than ±1,5 mK over the same
    temperature range based on the data from three thermometers.</p>"
