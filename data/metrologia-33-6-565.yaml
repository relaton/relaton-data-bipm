abstract:
- language: en
  script: Latn
  content: <p>The results of an international comparison between the He-Ne lasers
    stabilized to 127I2 at 633 nm of the IMGC (Istituto di Metrologia "G. Colonnetti",
    Turin, Italy) and the IFA-IFTAR (Institute of Atomic Physics-IFTAR, Department
    of Lasers, Bucharest, Romania) are reported. The mean frequency difference, considering
    the hyperfine structure components d, e, f and g of the R(127) 11-5 transition,
    was Δν = νRO.2 - νIMGCA4/5 = 3,8 kHz, standard uncertainty u = 5,7 kHz, or Δν/ν0
    = 0,8 × 10-11, standard uncertainty u = 1,2 × 10-11. The frequency stability,
    expressed as the relative Allan standard deviation of the beat note between the
    two lasers, resulted 3,7 × 10-12 for a 100 s sampling time.</p>
