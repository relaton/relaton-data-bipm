abstract:
- language: en
  script: Latn
  content: "<p><em>Entitic quantities</em> are quantities, such as entitic number
    (or number of entities) <em>N</em><sub>e</sub>(B), , entitic mass <em>m</em><sub>e</sub>(B)
    or entitic volume <em>V</em><sub>e</sub>(B), relating to a specified ''generalized
    molecule'' or <em>entity</em> B, such as H (meaning a single atom of hydrogen)
    or H<sub>2</sub>O or {(1 - <em>x</em>)H<sub>2</sub>0 + <em>x</em>CH<sub>3</sub>OH}.
    Molar quantities are the quotients of an extensive quantity and amount of substance
    <em>n</em><sub>B</sub>, such as molar number <em>N</em><sub>m</sub> {or Avogadro
    constant <em>L</em> = <em>N</em><sub>e</sub>(B)/<em>n</em>(B)}, molar mass <em>m</em><sub>m</sub>(B)
    {or <em>M</em>(B)}, or molar volume <em>V</em><sub>m</sub>(B), also of an <em>entity</em>
    B. It is shown that there is no imperative need to retain quantities like amount
    of substance <em>n</em>, or the Avogadro constant <em>L</em>, or the molar gas
    constant <em>R</em>, or the SI unit: mole. All of these could be discarded from
    the equations of physical science, though whether it would be useful to discard
    them is of course open to question.</p>"
