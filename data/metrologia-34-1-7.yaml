abstract:
- language: en
  script: Latn
  content: "<p>Entitic quantities are quantities, such as entitic number (or number
    of entities) Ne(B), , entitic mass me(B) or entitic volume Ve(B), relating to
    a specified ''generalized molecule'' or entity B, such as H (meaning a single
    atom of hydrogen) or H2O or {(1 - x)H20 + xCH3OH}. Molar quantities are the quotients
    of an extensive quantity and amount of substance nB, such as molar number Nm {or
    Avogadro constant L = Ne(B)/n(B)}, molar mass mm(B) {or M(B)}, or molar volume
    Vm(B), also of an entity B. It is shown that there is no imperative need to retain
    quantities like amount of substance n, or the Avogadro constant L, or the molar
    gas constant R, or the SI unit: mole. All of these could be discarded from the
    equations of physical science, though whether it would be useful to discard them
    is of course open to question.</p>"
