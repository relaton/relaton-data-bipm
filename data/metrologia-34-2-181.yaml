abstract:
- language: en
  script: Latn
  content: "<p>The hyperfine constants Δ<em>eQq</em>, Δ<em>C</em>, Δ<em>d</em> and
    Δδ are necessary for the reproduction or simulation of a hyperfine spectrum in
    iodine. A new empirical formula predicting Δ<em>eQq</em> to calculate any hyperfine
    component frequency of a ro-vibrational transition in the B-X system of <sup>127</sup>I<sub>2</sub>,
    covering <em>v</em>' = 6 to <em>v</em>' = 43, is presented here. The accuracy
    of the prediction of Δ<em>C</em>, Δ<em>d</em> and Δδ are discussed. The predicted
    value of Δ<em>eQq</em> agrees well with the recently presented value calculated
    for an observed hyperfine spectrum at 637 nm.</p>"
