abstract:
- language: en
  script: Latn
  content: "<p>A new least-squares method for the circle using a set of coordinate
    data (x, y) is presented. This method provides analytical expressions for the
    coordinates (X̂0, Ŷ0) of the central point of a circle and its radius R̂0. Expressions
    for the variances V (X̂0), V (Ŷ0) and V(R̂0), and the covariances cov (X̂0, Ŷ0),
    cov (X̂0, R̂0) and cov (Ŷ0, R̂0) are also presented. The method is applied to
    two problems, one in interferometry and the other in radiometry.</p>"
