abstract:
- language: en
  script: Latn
  content: "<p>It can be difficult to evaluate Lommel functions U(u,v) and V(u,v)
    when u and v are both large. Here, we present an accurate means to evaluate such
    functions using contour integration. The approach suggests the potential for developing
    analogous techniques in diffraction calculations for many optical systems.</p>"
