abstract:
- language: en
  script: Latn
  content: "<p>In the period 1998-2001, EUROMET organized a comparison of measurements
    of 10 V DC electronic reference standards. This comparison involved 22 national
    laboratories and the BIPM. The participating laboratories maintain their voltage
    reference by Josephson effect measurements or via Zener comparisons.</p><p>This
    paper describes the way the EUROMET.EM.BIPM-K11.b reference value  xR-EUR is computed
    in terms of the BIPM.EM-K11.b key comparison reference value  xR, i.e. how the
    quantity (xR-EUR -  xR) and its uncertainty are estimated.</p><p>Main text.\nTo
    reach the main text of this paper, click on \n .\nNote that this text is that
    which appears in Appendix B of the BIPM\nkey comparison database\n .</p><p>The
    final report has been peer-reviewed and approved for publication\nby the CCEM
    according to the provisions of the Mutual Recognition Arrangement (MRA).</p>"
