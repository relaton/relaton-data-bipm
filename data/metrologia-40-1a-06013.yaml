abstract:
- language: en
  script: Latn
  content: "<p>Since 1976, five national metrology institutes (NMIs) and another laboratory\nhave
    submitted 16 samples of known activity of  203Hg to the\nInternational Reference
    System (SIR) for activity comparison at the\nBureau International des Poids et
    Mesures. The activities ranged from\nabout 1 MBq to 22 MBq. The degrees of equivalence
    between each\nequivalent activity measured in the SIR and the key comparison reference\nvalue
    (KCRV) have been calculated and the results are given in the form\nof a matrix
    for the five NMIs. A graphical presentation is also given.</p><p>Main text.\nTo
    reach the main text of this paper, click on \n .\nNote that this text is that
    which appears in Appendix B of the BIPM\nkey comparison database\n .</p><p>The
    final report has been peer-reviewed and approved for publication\nby Section II
    of the Consultative Committee for Ionizing Radiation\n(CCRI(II)), comparison identifier
    BIPM.RI(II)-K1.Hg-203, according to\nthe provisions of the Mutual Recognition
    Arrangement (MRA).</p>"
