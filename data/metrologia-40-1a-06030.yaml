abstract:
- language: en
  script: Latn
  content: |-
    <p>Since 1982, two national metrology institutes (NMIs) have submitted three samples of known activity of  <sup>24</sup>Na to the International Reference System (SIR) for activity comparison at the Bureau International des Poids et Mesures. The activities ranged from about 1.5 MBq to 26 MBq. The degrees of equivalence between each equivalent activity measured in the SIR and the key comparison reference value (KCRV) have been calculated and the results are given in the form of a matrix for the two NMIs. A graphical presentation is also given.</p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The results of this comparison have been approved for publication by Section II of the Consultative Committee for Ionizing Radiation (CCRI(II)), comparison identifier BIPM.RI(II)-K1.Na-24, according to the
    provisions of the Mutual Recognition Arrangement (MRA).</p>
