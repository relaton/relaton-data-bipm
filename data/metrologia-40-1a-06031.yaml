abstract:
- language: en
  script: Latn
  content: |-
    <p>Results are presented of comparisons of eleven national primary standards for air kerma with the BIPM primary standard over the range of x-radiation qualities from 10 kV to 50 kV. For each radiation quality, the results are analysed in terms of the degree of equivalence,  <em>D</em>, of each national standard  <em>i</em> with respect to the key comparison reference value. The degrees of equivalence,  <em>D</em>, between each pairing of national standards  <em>i</em> and  <em>j</em> are also evaluated. These data form the basis of the matrices and graphs of results entered in the BIPM key comparison database for comparison BIPM.RI(I)-K2.</p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The summary report has been peer-reviewed and approved for publication by the Consultative Committee for Ionizing Radiation (CCRI), according to the
    provisions of the Mutual Recognition Arrangement (MRA).</p>
