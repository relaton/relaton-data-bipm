abstract:
- language: en
  script: Latn
  content: |-
    <p>Since 1976, ten national metrology institutes (NMIs) have submitted 24 samples of known activity of  <sup>22</sup>Na to the International Reference System (SIR) for activity comparison at the Bureau International des Poids et Mesures. The activities ranged from about 400 kBq to 20 MBq. The degrees of equivalence between each equivalent activity measured in the SIR and the key comparison reference value (KCRV) have been calculated and the results are given in the form of a matrix for ten NMIs. A graphical presentation is also given.</p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by Section II of the Consultative Committee for Ionizing Radiation (CCRI(II)), comparison identifier BIPM.RI(II)-K1.Na-22, according to the
    provisions of the Mutual Recognition Arrangement (MRA).</p>
