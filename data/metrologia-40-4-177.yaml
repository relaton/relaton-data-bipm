abstract:
- language: en
  script: Latn
  content: "<p>A measurand θ of interest is the ratio of two other quantities, μ<sub/>
    and μ<sub/>. A measurement experiment is conducted and results <em>P</em> and
    <em>Q</em> are obtained as estimates of μ<sub/> and μ<sub/>. The ratio <em>Y</em>
    = <em>P</em>/<em>Q</em> is generally reported as the result for the measurand
    θ. In this paper we consider the problem of computing an uncertainty interval
    for θ having a prescribed confidence level of 1−α. Although an exact procedure,
    based on an approach due to Fieller, is available for this problem, it is well
    known that this procedure can lead to unbounded confidence regions in certain
    situations. As a result, practitioners often use various non-exact methods. One
    such non-exact method is based on the propagation-of-errors approach described
    in the ISO <em>Guide to the Expression of Uncertainty in Measurement</em> to calculate
    a standard uncertainty <em>u</em><sub/> for <em>Y</em>. A confidence interval
    for θ with a presumed confidence level of 95% is obtained as [<em>Y</em>−2<em>u</em><sub/>,
    <em>Y</em>+2<em>u</em><sub/>]. In this paper we develop a highly accurate approximation
    for the coverage probability associated with the interval [<em>Y</em>−<em>ku</em><sub/>,
    <em>Y</em>+<em>ku</em><sub/>]. In particular, we demonstrate that, using <em>n</em>−1
    degrees of freedom for <em>u</em><sub/>, and the corresponding Student's <em>t</em>
    coverage factor <em>k</em> = <em>t</em><sub>1−α/2 : −1</sub> rather than <em>k</em>
    = 2, leads to uncertainty intervals [<em>Y</em>−<em>t</em><sub>1−α/2 : −1</sub><em>u</em><sub/>,
    <em>Y</em>+<em>t</em><sub>1−α/2 : −1</sub><em>u</em><sub/>], that are nearly identical
    to Fieller's exact intervals whenever the measurement relative uncertainties are
    small, as is the case in most metrological applications. In addition, they are
    easy to compute and may be recommended for routine use in metrological applications.
    Improved coverage factors <em>k</em> can be derived based on the results of this
    paper for those exceptional situations where the <em>t</em>-interval may not have
    coverage probability sufficiently close to the desired value.</p>"
