abstract:
- language: en
  script: Latn
  content: "<p>A value for the Avogadro constant, NA, was derived from new measurements
    of the lattice parameter, the density and the molar mass of a silicon single crystal.
    The result NA = 6.022 135 3 × 1023 mol−1 has a relative measurement uncertainty
    \n and is in excellent agreement with other published data based on the x-ray
    crystal density molar mass method, indicating the high repeatability of these
    experiments. The value differs significantly from the Committee on Data for Science
    and Technology's most recent recommended value of 6.022 141 99 × 1023 mol−1 by
    more than 1 × 10−6 NA.</p>"
