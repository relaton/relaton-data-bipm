abstract:
- language: en
  script: Latn
  content: "<p>From 1 January 2004 the Bundesamt für Eich- und Vermessungswesen (BEV),
    the national metrology institute of Austria, will change its air kerma standards
    for 137Cs and 60Co γ-rays. All calibration coefficients in calibration certificates
    of the BEV, issued after this date and which are traceable to these standards,
    will be increased by 1.02% and 0.80% for 137Cs and 60Co γ-rays, respectively.
    The quantities ambient dose equivalent H*(10), directional dose equivalent H′(0.07)
    and personal dose equivalent Hp(10) and Hp(0.07), which are derived from these
    standards, are changed by the same amounts.</p>"
