abstract:
- language: en
  script: Latn
  content: |-
    <p>Since 1975, six national metrology institutes (NMI) have submitted eight samples of known activity of  113Sn to the International Reference System (SIR) for activity comparison with comparison identifier BIPM.RI(II)-K1.Sn-113 at the Bureau International des Poids et Mesures (BIPM). The activities ranged from about 0.9 MBq to 22 MBq. The degrees of equivalence between each NMI have been calculated and the results are given in the form of a matrix for the six NMIs. </p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by Section II of the Consultative Committee for Ionizing Radiation (CCRI(II)), according to the provisions of the Mutual Recognition Arrangement (MRA).</p>
