abstract:
- language: en
  script: Latn
  content: |-
    <p>The Russian (VNIIM) and French (BNM-LNHB) national primary laboratories organized in 1997 a bilateral comparison in beta dosimetry. This comparison of national standards, EUROMET.RI(I)-S2.B2,  was carried out through a transfer ionization chamber manufactured by the VNIIM. The calibration factors of this chamber were determined by both laboratories in terms of absorbed dose rate at 7 mg cm-2 of tissue depth, for the beta radiation fields of  90Sr–90Y,  204Tl and  147Pm.</p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by EUROMET, according to the provisions of the Mutual Recognition Arrangement (MRA).</p>
