abstract:
- language: en
  script: Latn
  content: |-
    <p>Since 1977, nine national metrology institutes (NMIs) have submitted 19 samples of known activity of  65Zn to the International Reference System (SIR) for activity comparison at the Bureau International des Poids et Mesures (BIPM)), with comparison identifier BIPM.RI(II)-K1.Zn-65. The activities ranged from about 450 kBq to 15 MBq. The degrees of equivalence between each equivalent activity measured in the SIR and the key comparison reference value (KCRV) have been calculated and the results are given in the form of a matrix for eight laboratories. A graphical presentation is also given. </p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by Section II of the Consultative Committee for Ionizing Radiation (CCRI(II)), with comparison identifier BIPM.RI(II)-K1.Zn-65, according to the provisions of the Mutual Recognition Arrangement (MRA).</p>
