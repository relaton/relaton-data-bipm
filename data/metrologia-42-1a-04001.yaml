abstract:
- language: en
  script: Latn
  content: "<p>The idea of performing a comparison of squareness resulted from the
    need to review the MRA Appendix C, Category 90° square. At its meeting in October
    1999 (in Prague) it was decided upon a first comparison of squareness measurements
    in the framework of EUROMET, numbered #570, starting in 2000, with the Slovak
    Institute of Metrology (SMU) as the pilot laboratory.</p><p>During the preparation
    stage of the project, it was agreed that it should be submitted as a EUROMET supplementary
    comparison in the framework of the Mutual Recognition Arrangement (MRA) of the
    Metre Convention and would boost confidence in calibration and measurement certificates
    issued by the participating national metrology institutes.</p><p>The aim of the
    comparison of squareness measurement was to compare and verify the declared calibration
    measurement capabilities of participating laboratories and to investigate the
    effect of systematic influences in the measurement process and their elimination.</p><p>Eleven
    NMIs from the EUROMET region carried out this project. Two standards were calibrated:\n
    \nThe following parameters had to be calibrated:\n \nand/or\n \nThe results of
    the comparison are the deviations of profiles and angles measured by the individual
    NMIs from the reference values. These resulted from the weighted mean of data
    from participating laboratories, while some of them were excluded on the basis
    of statistical evaluation.</p><p>Graphical interpretations of all deviations are
    contained in the Final Report. In order to compare the individual deviations mutually
    (25 profiles for the granite square and 44 profiles for the cylinder), graphical
    illustrations of 'standard deviations' and both extreme values (max. and min.)
    of deviations were created.</p><p>This regional supplementary comparison has provided
    independent information about the metrological properties of the measuring equipment
    and method used by the participating NMIs.</p><p>The Final Report does not contain
    the En values. Participants could not estimate some contributions in the uncertainty
    budget on the basis of previous comparisons, since no comparison of this kind
    had ever been organized. Therefore the En value cannot reflect the actual state
    of the given NMI. Instead of En, an analysis has been performed by means of the
    Grubbs test according to ISO 5725-2.</p><p>This comparison provided information
    about the state of provision of metrological services in the field of big squares
    measurement.</p><p>Main text. To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison
    database  .</p><p>The final report has been peer-reviewed and approved for publication
    by EUROMET, according to the provisions of the Mutual Recognition Arrangement
    (MRA).</p>"
