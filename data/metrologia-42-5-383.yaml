abstract:
- language: en
  script: Latn
  content: "<p>Calibrations of tungsten strip lamps are basically in terms of the
    temperature at a small central part of the filament. We calculate this temperature
    <em>T</em><sub>m</sub>, which is dependent on the lamp current <em>I</em>, the
    temperature <em>T</em><sub>e</sub> at the ends of the filament and the dimensions
    of the filament including the length <em>L</em>, by solving a heat balance equation.
    For a given filament with specific <em>L</em> and <em>I</em>, a slightly different
    <em>T</em><sub>e</sub> results in a slightly different <em>T</em><sub>m</sub>.
    From the results the change of <em>T</em><sub>m</sub> relative to <em>T</em><sub>e</sub>,
    d<em>T</em><sub>m</sub>/d<em>T</em><sub>e</sub> is computed. Further results by
    varying <em>L</em> show that d<em>T</em><sub>m</sub>/d<em>T</em><sub>e</sub> at
    a fixed <em>T</em><sub>m</sub> always decreases with increasing <em>L</em>. For
    62 mm ⩽ <em>L</em> ⩽ 104 mm and <em>T</em><sub>e</sub> = 400 K, d<em>T</em><sub>m</sub>/d<em>T</em><sub>e</sub>
    at <em>T</em><sub>m</sub> = 1337 K decreases by a factor of approximately 2.5
    for every 12 mm increase in <em>L</em>. Due to the diminishing amount of decrease
    there is little gain by increasing <em>L</em> beyond 104 mm. Since <em>T</em><sub>e</sub>
    is linked to the temperature <em>T</em><sub>b</sub> of the lamp base, we expect
    d<em>T</em><sub>m</sub>/d<em>T</em><sub>b</sub> to decrease similarly with increasing
    <em>L</em>. We measure d<em>T</em><sub>λ</sub>/d<em>T</em><sub>b</sub>, where
    <em>T</em><sub>λ</sub> is the spectral radiance temperature at a wavelength λ
    of 650 nm and from which d<em>T</em><sub>m</sub>/d<em>T</em><sub>b</sub> is deduced,
    of three tungsten strip lamps of the high-stability type for a filament of 62 mm
    length and two similar lamps of 74 mm filament length at a <em>T</em><sub>b</sub>
    close to room temperature and 900 K ⩽ <em>T</em><sub>m</sub> ⩽ 1600 K. Results
    show that d<em>T</em><sub>m</sub>/d<em>T</em><sub>b</sub> of the longer filament
    is less than that of the shorter filament. It is beneficial to reduce d<em>T</em><sub>m</sub>/d<em>T</em><sub>b</sub>
    by reducing d<em>T</em><sub>m</sub>/d<em>T</em><sub>e</sub> so that <em>T</em><sub>m</sub>,
    and therefore the lamp calibration, is less dependent on the temperature of the
    lamp base. Our theoretical and experimental results have indicated that the reduction
    is possible by increasing the filament length. This finding may be applicable
    to the improvement of the performance of the tungsten strip lamps to match the
    ever-improving performance of the photoelectric radiation thermometers.</p>"
