abstract:
- language: en
  script: Latn
  content: |-
    <p>The results of the EUROMET key comparison on long gauge block measurement by interferometry (EUROMET.L-K2) are reported. The comparison involved the measurement, by 22 participating laboratories, of six steel gauge blocks ranging from 150 mm to 900 mm in length using techniques based on interferometry or mechanical comparison. The artefact circulation was performed in two loops, with two artefacts being replaced at the end of the first loop due to damage. The results are in very good agreement—out of the 93 results reported, all but 7 are in agreement (within their  k = 2 uncertainties) with the weighted mean values taken to be the Key Comparison Reference Values. The results of this key comparison will contribute to the Mutual Recognition Arrangement and will be used to link with results from other regional comparisons and the Key Comparison  .</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCL, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
