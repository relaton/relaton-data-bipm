abstract:
- language: en
  script: Latn
  content: |-
    <p>A supplementary bilateral comparison was carried out to compare the pressure defined by the CMI (Czech Republic) and the METAS (Switzerland). This comparison was motivated by the introduction of new measuring equipment in these laboratories. The transfer standard of the comparison is a piston-cylinder of about 10 cm2 whose effective area was determined at nine different values of pressure between 50 kPa and 600 kPa.
    The effective areas determined by the two laboratories are equivalent within the uncertainties. The results obtained by cross-floating are also in agreement with dimensional characterization of the transfer standard.
    This comparison is registered as Euromet project 788.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by EUROMET, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
