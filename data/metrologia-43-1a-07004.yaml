abstract:
- language: en
  script: Latn
  content: |-
    <p>This report details the method and results of a bilateral comparison carried out between the national force standard machines of Egypt and the United Kingdom, in the range from 5 kN to 5 MN. The results are analysed using the  <em>E</em> ratio technique and indicate that the uncertainty claims of the two laboratories can, in general, be supported. A number of recommendations on revised protocols to be used for future comparisons are also given.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by EUROMET, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
