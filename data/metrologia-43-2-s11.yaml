abstract:
- content: "<p>At the Physikalisch-Technische Bundesanstalt a new robot-based gonioreflectometer
    for measuring radiance factor and bidirectional reflectance-distribution function
    has been developed. The facility enables measurements of the directed reflection
    characteristics of materials with arbitrary angles of irradiation and detection
    relative to the surface normal.</p>"
