abstract:
- language: en
  script: Latn
  content: "<p>This paper gives equations that enable a method of uncertainty analysis
    recently described (Willink R 2005 <em>Metrologia</em> 42 329–43) to accommodate
    influence variables with asymmetric probability distributions. The equations permit
    the calculation of 90%, 95%, 98% and 99% coverage intervals [<em>a</em>, <em>b</em>]
    for the measurand <em>Y</em> = <em>F</em>(<em>X</em><sub>1</sub>,…, <em>X</em><sub/>)
    from the first four moments of an approximating distribution. The equations for
    90% and 98% are presented so that the one-sided probability statements Pr(<em>Y</em>
    ⩾ <em>a</em>) = <em>P</em> and Pr(<em>Y</em> ⩽ <em>b</em>) = <em>P</em> can be
    supplied for the familiar probability levels of <em>P</em> = 95% and <em>P</em>
    = 99%. Additional equations are provided so that the exact moments can be calculated
    in certain non-linear problems. An improved method is given for dealing with inputs
    that have shifted and scaled <em>t</em>-distributions with 4 or fewer degrees
    of freedom, for which the first four moments do not all exist.</p>"
