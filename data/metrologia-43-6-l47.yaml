abstract:
- language: en
  script: Latn
  content: "<p>We propose two experimental schemes for the determination of the Avogadro
    constant <em>N</em><sub>A</sub> with a relative uncertainty of 10<sup>−7</sup>
    or better combining a watt balance experiment and a cold atom experiment measuring
    <em>h</em>/<em>m</em>(<em>X</em>) (where <em>h</em> is the Planck constant and
    <em>m</em>(<em>X</em>) the mass of the atom <em>X</em>). We give some prospects
    about possible uncertainties, and we discuss the opportunity to test the existence
    of possible unknown correction factors for the Josephson effect and the quantum
    Hall effect.</p>"
