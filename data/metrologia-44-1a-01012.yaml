abstract:
- language: en
  script: Latn
  content: "<p>The key comparison EUROMET.EM-K6.a was a bilateral comparison between
    PTB, Germany and BIM, Bulgaria and is linked to the corresponding comparison  ,
    in which PTB participated. It is aimed at the following objectives:\n \nThe quantitity
    to be compared was the ac–dc voltage transfer difference of the travelling standard,
    a Fluke 792A AC/DC Transfer Standard, at 3 V and at frequencies 1 kHz, 20 kHz
    and 100 kHz. The obtained results show very good agreement with the reference
    value within the expanded uncertainties.</p><p>Main text.\nTo reach the main text
    of this paper, click on  . Note that this text is that which appears in Appendix
    B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed
    and approved for publication by the CCEM, according to the provisions of the CIPM
    Mutual Recognition Arrangement (MRA).</p>"
