abstract:
- language: en
  script: Latn
  content: "<p>The atomic-scale unit, entity (ent), is defined as the number-specific
    amount of substance, <em>n</em>/<em>N</em>, the amount of substance of a single
    entity. This unit is an invariant physical quantity (the reciprocal of the Avogadro
    constant) that serves as the basis for redefining the SI base unit for amount
    of substance in a direct and easily understood manner. It is argued here that
    the kilomole should be the <em>base</em> unit in order to avoid factors of 10<sup>−3</sup>
    or 10<sup>3</sup> appearing in relationships involving both mass and amount of
    substance expressed in base units. Since, in a compatible formulation, the amount-specific
    number of entities, <em>N</em>/<em>n</em> (= <em>N</em><sub>A</sub>), is equal
    to <em>M</em><sub>u</sub>/Da, exactly, where <em>M</em><sub>u</sub> = kg kmol<sup>−1</sup>
    = g mol<sup>−1</sup> = Da ent<sup>−1</sup>, exactly, then <em>N</em><sub>A</sub>
    = (kg/Da) kmol<sup>−1</sup> = (g/Da) mol<sup>−1</sup> = 1 ent<sup>−1</sup>, exactly.
    The kilomole can thus be defined very simply as: \n, exactly, where \n, the <em>exact</em>
    kilomole-to-entity <em>amount</em> ratio, is identical to the kilogram-to-dalton
    <em>mass</em> ratio: \n. The Avogadro constant, \n, does not appear explicitly
    in the defining equation, its reciprocal having been replaced by one entity. Like
    the dalton, the entity would be categorized as a unit in use with SI.</p>"
