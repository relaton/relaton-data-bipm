abstract:
- language: en
  script: Latn
  content: "<p>The atomic-scale unit, entity (ent), is defined as the number-specific
    amount of substance, n/N, the amount of substance of a single entity. This unit
    is an invariant physical quantity (the reciprocal of the Avogadro constant) that
    serves as the basis for redefining the SI base unit for amount of substance in
    a direct and easily understood manner. It is argued here that the kilomole should
    be the base unit in order to avoid factors of 10−3 or 103 appearing in relationships
    involving both mass and amount of substance expressed in base units. Since, in
    a compatible formulation, the amount-specific number of entities, N/n (= NA),
    is equal to Mu/Da, exactly, where Mu = kg kmol−1 = g mol−1 = Da ent−1, exactly,
    then NA = (kg/Da) kmol−1 = (g/Da) mol−1 = 1 ent−1, exactly. The kilomole can thus
    be defined very simply as: \n, exactly, where \n, the exact kilomole-to-entity
    amount ratio, is identical to the kilogram-to-dalton mass ratio: \n. The Avogadro
    constant, \n, does not appear explicitly in the defining equation, its reciprocal
    having been replaced by one entity. Like the dalton, the entity would be categorized
    as a unit in use with SI.</p>"
