abstract:
- language: en
  script: Latn
  content: |-
    <p>The CCQM key comparison K42 was organized by the inorganic analysis working group of CCQM to test the abilities of metrological institutes to measure the mass fractions of the components of an aluminium alloy. Chosen elements were chromium (Cr), copper (Cu), iron (Fe), manganese (Mn) and zinc (Zn). The BAM Federal Institute for Materials Research and Testing (BAM Bundesanstalt für Materialforschung und -prüfung) in Berlin, Germany acted as the pilot laboratory. CCQM-K42 demonstrates the abilities of metrological institutes to measure the mass fractions of minor and trace components (mass content about 0.05% to 0.2%) of an aluminium alloy for chromium (Cr), copper (Cu), iron (Fe), manganese (Mn) and zinc (Zn). The analytical methods used were neutron activation analysis (NAA), x-ray fluorescence spectrometry (XRF) using the reconstitution technique, ICP-OES and ICP-MS. The scope of the key comparison extends to non-ferrous alloys comprising the same or similar constituents when analysed using the technique(s) applied by a participant in obtaining the results submitted for CCQM-K42.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
