abstract:
- language: en
  script: Latn
  content: "<p>We address a difficulty in appreciating that the pair-difference chi-squared-like
    statistic (Steele <em>et al</em> , Douglas and Steele ) is truly unmediated (i.e.
    independent of any reference value), namely the incorrect thought that this aggregating
    statistic might merely be hiding a reference value that has the same chi-squared.
    We show that the equation for this reference value commonly has no real solution.
    Regarding pair-difference statistics as unmediated statistics conveniently avoids
    any complex reference value, and offers a stark simplicity that exactly captures
    the simplest way in which measurements are really used in practical chains of
    metrological inference.</p>"
