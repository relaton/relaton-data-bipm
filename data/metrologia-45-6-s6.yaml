abstract:
- language: en
  script: Latn
  content: "<p>TWSTFT (Two Way Satellite Time and Frequency Transfer, TW hereafter)
    is a major technique used in TAI (International Atomic Time) generation. More
    than two-thirds of TAI clocks and almost all the primary frequency standards are
    transferred using TW. Up to now, the only geometry in TAI time transfer is <em>single-link</em>.
    However, the TAI TW time transfer data are highly redundant. In general, for an
    <em>N</em>-point network, there are <em>N</em>(<em>N</em> − 1)/2 independently
    measured links. Among them, only <em>N</em> − 1 will be used. We then have (<em>N</em><sup>2</sup>
    − 3<em>N</em> + 2)/2 redundant links. As a function of <em>N</em>, the redundant
    measurements increase quickly (cf figure 1 and table 1). At present, for the European–American
    network <em>N</em> = 13, but only 12 out of a total of 78 measured links are used
    in TAI. For the Asia–Pacific regions, <em>N</em> = 8. Full use of the high redundancy
    is an effective way to improve TAI without new cost.</p><p>The sum of three TW
    links that form a closed triangle is the triangle closure. Theoretically a closure
    is expected to be zero if there are no measurement errors, namely the triangle
    closure condition. A non-zero closure is a true error and an index of the time
    link quality. A redundant link sets a geometric constraint. There are (<em>N</em><sup>2</sup>
    − 3<em>N</em> + 2)/2 independent conditions in a network. In 2006, Jiang and Petit
    (<em>Proc. EFTF 2006</em> pp 468–75) proposed a mathematical model to adjust the
    closures to zero by global network processing. In consequence, time transfer between
    any two points through any link(s) in the network gives exactly the same result
    with the same uncertainty. This is the so-called <em>network time transfer</em>.</p><p>In
    this paper, the author introduces his recent works on completing the network model
    by adding the calibration, the uncertainty estimation and the quality assessment
    using GPS PPP (time transfer by precise point positioning (PPP hereafter)) (Kouba
    and Héroux 2001 <em>GPS Solut.</em> 5 12–28, Ray and Senior , Orgiazzi <em>et
    al</em> 2005 <em>Proc. IEEE FCS 2005</em> pp 337–45, Defraigne <em>et al</em>
    2007 <em>Proc. EFTF 2007</em> pp 909–13, Petit and Jiang 2008 <em>Int. J. Navig.
    Obs.</em> 2008 1–8). As an independent technique with higher short-term stability,
    PPP is then a good reference to evaluate the improvement in the network time transfer.
    The gain is at least 30%. The new method also gives a solution for the high redundancy
    in the TAI international TW time transfer network. The TAI software Tsoft is operational
    to perform the network time transfer.</p>"
