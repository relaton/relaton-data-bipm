abstract:
- language: en
  script: Latn
  content: |-
    <p>In order to assess the performance of the standards and techniques used for calibration and measurement of UVA irradiance responsivity of photodetectors in NMISA, South Africa, a new comparison was decided as a follow-up to comparison  . It is registered in the Key Comparison Data Base (KCDB) of BIPM as a bilateral supplementary comparison, with the identifier APMP.PR-S1.1. The comparison was carried out following the same technical protocol as that of supplementary comparison APMP PR-S1.</p><p>The principle, organization and method of the comparison, as well as the preliminary measurements at the pilot laboratory NMC-A*STAR Singapore, were described in the Final Report of the APMP.PR-S1 comparison. The results of this bilateral comparison show that the NMISA's results lie within ±2% against the comparison reference values of APMP.PR-S1, which is a great improvement.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the APMP, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
