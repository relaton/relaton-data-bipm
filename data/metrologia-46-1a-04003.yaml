abstract:
- language: en
  script: Latn
  content: "<p>The Mutual Recognition Arrangement of the CIPM indicates that a metrological
    equivalence of national measurement standards and calibration certificates issued
    by national metrology institutes (NMIs) should be established by a set of key
    comparisons chosen and organized by the Consultative Committees of the Comité
    Internationale des Poids et Mesures on key techniques. The CCL (Comité Consultative
    de Longueur), identified several key comparisons in the field of dimensional metrology.
    In particular, it decided that a coordinate measuring machine (CMM) two-dimensional
    (2-D) artifact should be carried out. CENAM (Centro Nacional de Metrología) was
    designated as pilot laboratory and NMIs of signatories of the Metre Convention
    were invited to participate. The comparison is aimed to support the Calibration
    and Measurement Capabilities (CMCs) claims of NMIs for CMM 2-D standards calibration.</p><p>Twelve
    NMIs from four Regional Metrology Organizations finished the comparison and one
    withdrew. The final participants were as follows:\n </p><p>A Draft B report was
    circulated among the participants and, after review and approval by all of the
    participants, it became the final report. It comprises all the information about
    the comparison: the measurement results, the choice of a Key Comparison Reference
    Value, the estimation of its uncertainty, the performance of each participant
    with respect to this value and the Birge ratio for each measurand of the two artifacts.</p><p>It
    was decided afterwards at CCL that the exercise be classed as a supplementary
    comparison but the reference of CCL-K6 was kept.</p><p>In an Appendix the equivalences
    of all measurands of each laboratory with respect to the reference value are reported
    for both artifacts, as well as the pairwise equivalences between laboratories
    for all measurands of both artifacts. The results are shown on tables as well
    as in plots.</p><p>The comparison was scheduled to start in January 2001 and span
    the circulation until December 2002. The circulation scheme was delayed for many
    reasons. It finally ended in September 2004.</p><p>The following main conclusions
    may be drawn:\n \n</p><p>Main text.\nTo reach the main text of this paper, click
    on  .\nNote that this text is that which appears in Appendix B of the BIPM key
    comparison database  .</p><p>The final report has been peer-reviewed and approved
    for publication by the CCL, according to the provisions of the CIPM Mutual Recognition
    Arrangement (MRA).</p>"
