abstract:
- language: en
  script: Latn
  content: |-
    <p>A first comparison of the standards for air kerma of the Instituto Tecnológico e Nuclear (ITN), Portugal and of the Bureau International des Poids et Mesures (BIPM) has been carried out in  60Co radiation under the auspices of the key comparison BIPM.RI(I)-K1. The comparison result, expressed as a ratio of the ITN standard and the BIPM standard, is 1.0015 (0.0018). The degrees of equivalence between the ITN and the other participants in the key comparison have been calculated and the results are presented in the form of a matrix. A graphical presentation is also given.</p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI Section I, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
