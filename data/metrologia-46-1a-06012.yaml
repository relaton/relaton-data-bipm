abstract:
- language: en
  script: Latn
  content: |-
    <p>A first comparison of the standards for air kerma of the Instituto Tecnológico e Nuclear (ITN), Portugal and of the Bureau International des Poids et Mesures (BIPM) has been carried out in  137Cs gamma radiation. The comparison result, expressed as a ratio of the ITN standard and the recently re-evaluated BIPM standard, is 1.0013 (0.0021).</p><p>Main text.
