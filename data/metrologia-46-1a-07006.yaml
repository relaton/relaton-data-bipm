abstract:
- language: en
  script: Latn
  content: |-
    <p>Hydrometers are instruments usually made of glass which are widely used for different levels of precision to measure liquid density and related quantities to control different products and processes. This bilateral comparison on the calibration of hydrometers shows that results reported by CENAM–Mexico and INRIM–Italy are consistent within the claimed uncertainty in the range of 800 kg/m3 to 1200 kg/m3.</p><p>This bilateral comparison is intended to link the two regional comparisons SIM.M.D-K4 and EURAMET.D-K4.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by SIM, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
