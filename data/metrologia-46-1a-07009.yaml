abstract:
- language: en
  script: Latn
  content: "<p>Mass calibration is an important activity for national institutes of
    metrology, due to the number of measurements on scientific, industrial and legal
    activities that have traceability to the national mass standards of each country.</p><p>The
    main objectives of this SIM comparison were:\n \nIn order to reach such objectives,
    two weights of stainless steel were measured in both laboratories from February
    to March 2009. For the measurements each laboratory used its own facilities, equipment,
    mass standards and procedures. The measurements done by the laboratories are traceable
    to CENAM's prototype (for CENAM), and  NIST's prototype (for INEN).</p><p>Results
    reported by both participants are consistent within the reported uncertainties,
    the largest normalized error calculated for this comparison being 0.73.</p><p>Main
    text.\nTo reach the main text of this paper, click on  . Note that this text is
    that which appears in Appendix B of the BIPM key comparison database  .</p><p>The
    final report has been peer-reviewed and approved for publication by SIM, according
    to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>"
