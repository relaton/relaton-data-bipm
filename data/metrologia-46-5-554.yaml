abstract:
- language: en
  script: Latn
  content: "<p>The dependence of the eigenvalues of the TM1n and TE1n electromagnetic
    triplet modes on the shape of a triaxial ellipsoid cavity resonator is investigated.
    For an ellipsoid with semi-axes proportional to 1 : (1 + ϵ1) : (1 + ϵ2) the fractional
    perturbations of the triplet components are found to second order in ϵ1 and ϵ2.
    The formulae are derived from the results of Kokkorakis and Roumeliotis (1997
    J. Electromagn. Waves Appl. 11 279–92) for prolate and oblate spheroids. Finite-element
    calculations were carried out to confirm the accuracy of the formulae and to determine
    the next correction terms.</p>"
