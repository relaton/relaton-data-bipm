abstract:
- language: en
  script: Latn
  content: "<p>When identical readings are independently obtained under low instrument
    resolution <em>d</em>, so that a reading <em>x</em> implies an actual value between
    <em>x</em> − (<em>d</em>/2) and <em>x</em> + (<em>d</em>/2), the method of fiducial
    inference yields the result that the commonly assumed standard uncertainty \n
    applies only to the case where the input standard deviation is known to be very
    low, ≈ 0.03<em>d</em> or less. The standard uncertainty \n is the standard deviation
    of a rectangular distribution whose base is of length <em>d</em>. If there is
    little knowledge of the input standard deviation, the standard uncertainty is
    closer to \n. The standard uncertainty \n is the standard deviation of a symmetrical
    (isosceles) triangular distribution whose base is of length <em>d</em>. This latter
    standard uncertainty increases above \n as the number of identical independent
    readings decreases.</p>"
