abstract:
- language: en
  script: Latn
  content: "<p>The aim of the project was to ensure the reliability of length measurement
    unit transfer in the field of measurement of deviations from straightness and
    flatness and to confirm the claimed measurement capabilities of the national state
    measurement standards of Republic of Belarus, Republic of Kazakhstan and Russia.</p><p>The
    comparison was conducted on a granite bridge of the Kazakhstan measurement standard
    by the measurement of its deviations from straightness using instruments which
    are parts of the national measurement standards of comparison participants and
    which they brought.</p><p>The measurement results were processed, the uncertainty
    budgets and the confidence levels were determined, and the results were analyzed.</p><p>In
    summary: \n </p><p>Main text.\nTo reach the main text of this paper, click on
    \ . Note that this text is that which appears in Appendix B of the BIPM key comparison
    database  .</p><p>The final report has been peer-reviewed and approved for publication
    by COOMET, according to the provisions of the CIPM Mutual Recognition Arrangement
    (MRA).</p>"
