abstract:
- language: en
  script: Latn
  content: |-
    <p>Measurements have been made at five national metrology institutes (NMIs) in the subject field of dimensional measurement using scanning probe microscopy. Four of the participating NMIs are in Europe, the fifth is in the Asia-Pacific region. Each NMI made measurements of four step height standards and two 1D grating standards. These are typical artefact standards used for dimensional nanometrology. Each participant used a different atomic force microscope to perform the measurements. The report lists the results obtained by the individual participants, as well as an analysis of the results and their uncertainties, based on calculation of the weighted means and  <em>E</em> values. The results are in good agreement with one another.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by EURAMET, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
