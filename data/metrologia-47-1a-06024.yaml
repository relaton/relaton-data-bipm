abstract:
- language: en
  script: Latn
  content: |-
    <p>A first key comparison has been made between the air-kerma standards of the NMIJ and the BIPM in mammography x-ray beams. The results show the standards to be in agreement at the level of the combined standard uncertainty of 3.7 parts in 103. The results are analysed and presented in terms of degrees of equivalence for entry in the BIPM key comparison database.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI Section I, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
