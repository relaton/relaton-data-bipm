abstract:
- language: en
  script: Latn
  content: |-
    <p>At its meeting in October 2006 in Querétaro, Mexico, the Interamerican Metrology System (SIM) Technical Committee for Fluid Flow (TCFF) approved a Regional Key Comparison for Volume of Liquids at 20 L and 100 mL, to be piloted by the national metrology institute of Mexico (CENAM). The objective of this comparison was to demonstrate the degree of equivalence of the volume measurement standards held at national measurement institutes (NMIs) and to provide supporting evidence for the Calibration and Measurement Capabilities (CMCs) claimed by the participating laboratories in the Americas.</p><p>During the comparison, one of the pycnometers suffered irreversible damage, and degrees of equivalence for volume at 100 mL were calculated using the results obtained with one single pycnometer (TS 03.04.04).</p><p>Conclusions are as follows:
