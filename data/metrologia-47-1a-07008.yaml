abstract:
- language: en
  script: Latn
  content: |-
    <p>An interlaboratory comparison (Euramet Project 1039) of three absolute gravimeters was carried out between the national metrology institutes of Luxembourg, Belgium and Switzerland (University of Luxembourg/ECGS, Royal Observatory of Belgium and Federal Office for Metrology METAS). The comparison was hosted in the Underground Laboratory for Geodynamics in Walferdange. The obtained results confirm a perfect agreement between the instruments used with respective expanded uncertainties (<em>k</em> = 2) of 4.25 µGal. Finally, a link to the Euramet project 1030 shows that the three gravimeters are coherent with the 19 other gravimeters.</p><p>Main text.
    To reach the main text of this paper, click on  .
    Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by EURAMET, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
