abstract:
- language: en
  script: Latn
  content: |-
    <p>The key comparison CCQM-K65 was intended to compare the capabilities for the preparation and value assignment of gas standards for methyl and ethyl mercaptans in methane, maintained at the participating national metrological institutes: VNIIM (Russia), KRISS (Korea), VSL (Netherlands) and NPL (United Kingdom). The range of the nominal amount of substance fractions of the comparison gas mixtures was 20 µmol/mol to 30 µmol/mol, which is close to regulatory level (in several countries including Russia) for mercaptans in odorated natural gas. This comparison was proposed at the 12th GAWG meeting in October 2004 and was conducted in 2008.</p><p>Conclusions are as follows:
     </p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
