abstract:
- language: en
  script: Latn
  content: "<p>We report on acoustic and microwave measurements made with a purified
    helium sample maintained close to a single thermodynamic state (<em>T</em><sub>exp</sub>
    ∼ 273.16 K, <em>p</em><sub>exp</sub> ∼ 410 kPa) within a 2.1 L volume stainless
    steel spherical cavity. From these measurements and <em>ab initio</em> calculations
    of the non-ideality and the refractive index of helium, we determine a value for
    the Boltzmann constant <em>k</em><sub>B</sub> which is consistent with the recommended
    2006 CODATA value: (<em>k</em><sub>B</sub> − <em>k</em><sub>2006</sub>)/<em>k</em><sub>2006</sub>
    = (−7.5 ± 7.5) × 10<sup>−6</sup>. We discuss the current limits of the experiment
    and the prospects of a further reduction in the uncertainty associated with the
    determination of <em>k</em><sub>B</sub>.</p>"
