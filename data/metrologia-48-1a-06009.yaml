abstract:
- language: en
  script: Latn
  content: |-
    <p>Eight national standards for absorbed dose to water in  60Co gamma radiation at the dose levels used in radiation processing have been compared over the range from 1 kGy to 30 kGy using the alanine dosimeters of the NIST and the NPL as the transfer dosimeters. The comparison was organized by the Bureau International des Poids et Mesures, who also participated at the lowest dose level using their radiotherapy-level standard for the same quantity. The national standards are in general agreement within the standard uncertainties, which are in the range from 1 to 2 parts in 102. Evidence of a dose rate effect is presented and discussed briefly.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI Section I, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
