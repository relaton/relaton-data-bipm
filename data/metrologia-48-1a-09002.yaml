abstract:
- language: en
  script: Latn
  content: |-
    <p>A bilateral regional comparison of national microphone standards from 2 Hz to 250 Hz was carried out between the DP NDI 'Systema' (Ukraine) and the VNIIFTRI (Russia) from July to September 2009. The comparison, COOMET.AUV.A-K2, was based on the pressure calibration of laboratory standard microphones type LSIP. The comparison results have been linked to the established key comparison reference value (KCRV) of  . The degrees of equivalence, expressed as the deviation from the established KCRV and its expanded uncertainty (<em>k</em> = 2), have been determined, and the comparison result is in agreement with the KCRV within the estimated uncertainties at all employed frequencies.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCAUV, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
