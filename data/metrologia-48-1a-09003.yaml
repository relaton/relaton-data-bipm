abstract:
- language: en
  script: Latn
  content: |-
    <p>This report describes the results obtained in a bilateral comparison of primary vibration calibration facilities. Two piezoelectric standard accelerometers (one single-ended as well one back-to-back type) were calibrated first at METAS, then at the PTB and again at METAS after their return.</p><p>The METAS and the PTB calibrations were found to be in excellent agreement, with a mean difference smaller than the expanded uncertainty (<em>k</em> = 2) of the comparison.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCAUV, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
