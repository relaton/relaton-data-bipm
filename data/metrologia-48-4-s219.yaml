abstract:
- language: en
  script: Latn
  content: "<p>Global Navigation Satellite Systems (GNSSs) use <em>internal</em> reference
    time scales: <em>GPS Time</em>, <em>GLONASS Time, Galileo System Time</em> and
    <em>BeiDou System Time</em>. Constructed from a clock ensemble, they are designed
    for internal system synchronization, necessary to produce a navigation solution.
    They are usually steered to an external stable reference time scale, for example
    UTC(USNO), modulo 1 s, for <em>GPS time</em>. To achieve safe operation of a GNSS,
    a system time should preferably be a uniform time scale not affected by the leap
    seconds of Coordinated Universal Time (UTC). But this is not compatible with international
    recommendations that radio broadcast time signals should conform as closely as
    possible to UTC. This paper describes the various approaches chosen by GNSS providers
    and the relation between GNSS <em>system times</em> and UTC in terms of numbering
    of seconds. Different solutions for numbering seconds do not help the GNSS interoperability.
    This paper also explains why, on some occasions, GNSS <em>system times</em> play
    a role of alternative time scales with the consequent risk of confusion.</p>"
