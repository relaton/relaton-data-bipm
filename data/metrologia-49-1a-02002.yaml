abstract:
- language: en
  script: Latn
  content: |-
    <p>We report the results of the international comparison of LED measurements on the quantity of averaged LED intensity in condition B defined by the International Commission on Illumination (CIE). The comparison is conducted by circulating five different types of artefact LEDs (red, green, blue, white and diffuser-type green) to 15 National Metrology Institutes (NMIs). The artefact LEDs are prepared by functional seasoning to enable a temperature correction based on the junction voltage measurement. The comparison reference values and the unilateral degrees of equivalence (DoEs) of each participant are calculated for each type of LEDs from the reported measurement results.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by APMP, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
