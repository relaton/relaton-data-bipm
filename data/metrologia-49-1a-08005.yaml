abstract:
- language: en
  script: Latn
  content: |-
    <p>There is a high international priority attached to activities which reduce NOx in the atmosphere. The current level of permitted emissions is typically between 50 µmol/mol and 100 µmol/mol, but lower values are expected in the future. Currently, ambient air quality monitoring regulations also require the measurement of NOx mole fractions as low as 0.2 µmol/mol. The production of accurate standards at these levels of mole fractions requires either dilution of a stable higher concentration gas standard or production by a dynamic technique, for example one based on permeation tubes.</p><p>The CCQM-K74 key comparison was designed to evaluate the level of comparability of National Metrology Institutes' measurement capabilities and standards for nitrogen dioxide (NO2) at a nominal mole fraction of 10 µmol/mol.</p><p>The measurements of this key comparison took place from June 2009 to May 2010.</p><p>Seventeen laboratories took part in this comparison coordinated by the BIPM and VSL. The key comparison reference value was based on BIPM measurement results, and the standard measurement uncertainty of the reference value was 0.042 µmol/mol.</p><p>This key comparison demonstrated that the results of the majority of the participants agreed within limits of ±3% relative to the reference value. The results of only one laboratory lay significantly outside these limits. Likewise this comparison made clear that a full interpretation of the results of the comparison needed to take into account the presence of nitric acid (in the range 100 nmol/mol to 350 nmol/mol) in the cylinders circulated as part of the comparison, as well as the possible presence of nitric acid in the primary standards used by participating laboratories.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (MRA).</p>
