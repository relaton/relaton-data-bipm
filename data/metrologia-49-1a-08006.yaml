abstract:
- language: en
  script: Latn
  content: |-
    <p>This pilot study compares the performance of participants in analyzing gas mixtures of nitrogen dioxide in nitrogen by comparison with in-house gravimetric standards using Fourier transformed infrared spectroscopy (FT-IR). In this study the same gas mixtures were used as in the key comparison   , which was designed to evaluate the level of comparability of National Metrology Institutes' measurement capabilities for nitrogen dioxide (NO2) at a nominal mole fraction of 10 µmol/mol. In the comparison CCQM-K74 most of the participants used chemiluminescence, with a small number using UV absorption or FT-IR spectroscopy, and thus it is of interest to improve understanding of the comparative performance of these techniques because they do not exhibit any cross-sensitivity to nitric acid (HNO3), which was known to be present in the mixtures used for the comparison.</p><p>The results of this pilot study indicate good consistency and a level of agreement similar to that reported in the comparison CCQM-K74, demonstrating that FT-IR can be operated as a comparison method when calibrated with appropriate gas standards and can achieve similar measurement uncertainties to chemiluminescence and UV absorption techniques.</p><p>An additional pilot study, CCQM-P110-B2, was conducted on the same gas mixtures in parallel with this pilot study. The second study addressed FT-IR spectroscopy when used to measure the gas mixtures with respect to reference spectra. The results of this second study will be reported elsewhere.</p><p>Main text.
    To reach the main text of this paper, click on   .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM-GAWG.</p>
