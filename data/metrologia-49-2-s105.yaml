  content: "<p>A new reference radiometer for downwelling atmospheric longwave irradiance
    has been designed and built. The new infrared integrating sphere (IRIS) radiometer
    is designed to acquire measurements with a time constant of less than 1Â s. Based
    on a thorough characterization, the IRIS radiometer is able to measure longwave
    irradiance with an expanded uncertainty of Â±1.8Â WÂ mâˆ’2 and Â±2.4Â WÂ mâˆ’2 in the summer
    and winter seasons, respectively, which is equivalent to a temperature range between
    +15Â Â°C and âˆ’15Â Â°C for typical conditions at Davos, Switzerland. The long-term
    stability of the IRIS radiometer was determined over a one year period, yielding
    a calibration reproducibility in the laboratory of 0.5%. Outdoor measurements
    with four IRIS radiometers were performed during 13 clear nights in April 2011.
    The four radiometers measured atmospheric longwave irradiance with differences
    ranging from âˆ’1.1Â WÂ mâˆ’2 to +0.7Â WÂ mâˆ’2, which were well within their estimated
    uncertainties.</p>"
