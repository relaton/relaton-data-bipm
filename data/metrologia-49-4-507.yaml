abstract:
- script: Latn
  content: Abstract<p>An analysis is made of the published results of over forty experiments
    that have determined either the mean energy Wair required to create an ion pair
    in dry air, the mean excitation energy Ic for graphite, or the product of Wair
    and the electron stopping-power ratio sc,air for graphite and air for 60Co gamma
    radiation. A minimization process is used in which the best estimates for Wair
    and sc,air are those that minimize the sum of the deviations, taking uncertainties
    into account. This approach yields self-consistent values for Wair, sc,air and
    the product Wairsc,air. The results of this process are the values Wair = 33.97 eV
    with standard uncertainty 0.11 eV, sc,air = 0.9926 for 60Co, with relative standard
    uncertainty 0.32%, and the product Wairsc,air = 33.72 eV for 60Co with standard
    uncertainty 0.08%. The resulting value for Ic depends on the treatment of the
    density effect in graphite, the best estimate being the value Ic = 81.1 eV with
    standard uncertainty 2.0 eV obtained when using the grain density in the evaluation
    of the graphite stopping power. The robustness of the analysis and the consequences
    for air-kerma primary standards for radiation dosimetry are discussed.</p>
