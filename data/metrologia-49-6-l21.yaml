abstract:
- script: Latn
  content: Abstract<p>We calculated the eigenvalues of the radially symmetric acoustic
    modes of a gas-filled, spherical cavity to order (<em>δ</em><sub>t</sub>/<em>a</em>)<sup>2</sup>,
    where <em>δ</em><sub>t</sub> is the thickness of the thermal boundary layer and
    <em>a</em> is the radius of the cavity. Our results explain an anomaly revealed
    by high-precision acoustic measurements made to redetermine the Boltzmann constant.</p>
