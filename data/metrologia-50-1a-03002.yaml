abstract:
- language: en
  script: Latn
  content: |-
    <p>A bilateral comparison has been organized between VSL, The Netherlands, and BIM, Bulgaria, of the realisations of the international temperature scale ITS-90 at the fixed points of Hg, H2O, Ga, In, Sn and Zn using a long-stem SPRT of very good stability as the transfer device. This comparison is registered as EURAMET project T-K3.1 in the BIPM key comparison database and its results are linked to those of key comparison  .</p><p>This comparison was organized in the framework of Phare project BG 2005/017-353.02.02, Lot 1, and is in this framework financed by the EU. This project ran from March 2008 to the end of February 2009.</p><p>For all points of the measurements, a good agreement between the results obtained by BIM and in CCT-K3 could be demonstrated.</p><p>Main text.
    To reach the main text of this paper, click on  . Note that this text is that which appears in Appendix B of the BIPM key comparison database  .</p><p>The final report has been peer-reviewed and approved for publication by the CCT, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
