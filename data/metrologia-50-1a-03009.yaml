abstract:
- language: en
  script: Latn
  content: |-
    <p>As the European extension of the first CCT humidity key comparison,  was successfully completed in year 2008. After this comparison, a new low dew-point generator was introduced at LPM in Croatia as a result of progress in the EUROMET P912 project. With this new facility, the LPM uncertainties decreased significantly and the operating range became significantly wider. Therefore, it was decided to arrange a bilateral comparison between LPM and MIKES in Finland providing a link to EUROMET.T-K6 and CCT-K6. This comparison was carried out in a manner similar to other K6 comparisons but only one transfer standard was used instead of two units and the measurement point −70 °C was added to the measurement scheme. At all measurement points, the bilateral equivalence was well within the estimated expanded uncertainty at the approximately 95% confidence level. Also, the deviations of the LPM results from the EUROMET.T-K6 reference values were smaller than their expanded uncertainties.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCT, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
