abstract:
- language: en
  script: Latn
  content: |-
    <p>An indirect comparison of the standards for air kerma of the Laboratoire National de Métrologie et d'Essais–Laboratoire National Henri Becquerel (LNE–LNHB), France and of the Bureau International des Poids et Mesures (BIPM) was carried out in the <sup>60</sup>Co radiation beam of the BIPM in April 2013. The comparison result, evaluated as a ratio of the LNE–LNHB and the BIPM standards for air kerma, is 0.9994 with a combined standard uncertainty of 1.8 × 10<sup>−3</sup>. The results are analysed and presented in terms of degrees of equivalence for entry in the BIPM key comparison database.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
