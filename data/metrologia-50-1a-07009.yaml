abstract:
- language: en
  script: Latn
  content: |-
    <p>The bilateral supplementary comparison APMP.M.P-S4 on pressure measurements in the range (60 to 350) kPa of gauge pressure in gas media was organized by National Institute of Metrology of Thailand, NIMT, as the pilot laboratory, comparing with Physikalisch-Technische Bundesanstalt of Germany, PTB. The objective of this comparison is to check equivalence of gas pressure standards between NIMT and PTB. The period of measurement covered November to December 2012. NIMT provided a transfer standard, which was a WC–WC piston–cylinder assembly (PCA) with a nominal effective area of 10 cm2 manufactured by Fluke Corporation, DHI. The measurements were performed at pressures (60, 100, 150, 200, 250, 300 and 350) kPa. The NIMT laboratory standard used was a pressure balance with a PCA of 10 cm2 manufactured by DHI and identified by serial number 0693. The PTB laboratory standard used was a pressure balance with a PCA of 10 cm2 manufactured by Desgranges et Huot (DH) and identified by serial number 288. The results of this comparison show that the relative difference of the effective area values obtained by NIMT and PTB is not larger than 4.3 ppm, which corresponds to En = 0.26. Therefore, it confirms that the gas pressure standards maintained by the two institutes, NIMT and PTB, in the pressure range (60 to 350) kPa in gauge mode are equivalent under their uncertainties claimed. The result of this comparison is essential to support the calibration and measurement capabilities (CMC) of NIMT in this pressure range.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the APMP, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
