abstract:
- language: en
  script: Latn
  content: |-
    <p>This supplementary comparison is designed to test the capabilities of the participants to measure and certify carbon dioxide in nitrogen, and to provide supporting evidence for the CMCs of institutes for carbon dioxide. Indeed this comparison aims to demonstrate the capabilities of IPQ in the production of primary gas mixtures of carbon dioxide in nitrogen and for the participant laboratories to demonstrate their capabilities on certifying primary gas mixtures of percent levels of carbon dioxide in nitrogen.</p><p>Moreover, a number of NMIs had already participated in the key comparison , but in a lower range. This EURAMET comparison offers an opportunity to the laboratories to submit CMC in a higher range.</p><p>In this comparison the laboratories analysed the gas mixtures that are gravimetrically produced and analyzed by IPQ. Each cylinder had its own reference value calculated from the gravimetric preparation. The pressure in the cylinders was approximately 10 MPa; aluminum cylinders of 5 dm3 nominal volume were used.</p><p>This comparison provides evidence in support of CMCs for carbon dioxide within the range of 1.0 × 10−2 mol/mol to 20.0 × 10−2 mol/mol in a nitrogen/air balance.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by EURAMET, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
