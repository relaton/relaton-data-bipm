abstract:
- language: en
  script: Latn
  content: |-
    <p>Results are presented of the COOMET supplementary comparison of the national measurement standards for air kerma in 137Cs γ radiation at protection level (~10 mGy/h). Ten National Metrology Institutes from the COOMET organization and the International Atomic Energy Agency participated in this COOMET project no. 445. The PTB acted as pilot laboratory. Two of the participants, the SMU (Slovakia) and the NSC-'IM' (Ukraine) participated in the measurements but did not submit a valid report of results. The comparison reference value (CRV) was obtained as the mean result of the PTB and the VNIIM, both of which had previously taken part in the key comparison BIPM-RI(I)-K5. The degree of equivalence with the CRV was evaluated. The results were consistent within the relative standard uncertainties of the comparison ranging from 0.28% to 1.3% and deviated from the CRV by less than 1%.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
