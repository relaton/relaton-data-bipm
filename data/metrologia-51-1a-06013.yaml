abstract:
- language: en
  script: Latn
  content: |-
    <p>An indirect comparison of the standards for air kerma of the National Institute of Standards and Technology (NIST), USA, and of the Bureau International des Poids et Mesures (BIPM) was carried out in the 60Co and 137Cs radiation protection-level beams of the BIPM in September 2011. The comparison results, based on the calibration coefficient for two transfer standards and expressed as a ratio of the NIST and the BIPM standards for air kerma, are 1.0023 with a combined standard uncertainty of 3.2 × 10−3 in 60Co, and 0.9990 with a combined standard uncertainty of 3.5 × 10−3 in 137Cs.</p><p>The result in the 60Co beam for radiation protection agrees within the uncertainties with the result of the comparison carried out at the same time in the CIS Bio 60Co beam for radiotherapy-level air kerma.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
