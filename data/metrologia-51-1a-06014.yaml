abstract:
- language: en
  script: Latn
  content: |-
    <p>In 2013, a comparison of activity measurements of 99mTc using the Transfer Instrument of the International Reference System (SIRTI) took place at the Institutul National de Cercetare – Dezvoltare in  Fizica si Inginerie Nucleara – 'Horia Hulubei' (IFIN-HH, Romania). Ampoules containing about 21 kBq and 40 kBq of a 99mTc solution were measured in the SIRTI for, respectively, one and three half-lives. The comparison, identifier BIPM.RI(II)-K4.Tc-99m, is linked to the BIPM.RI(II)-K1.Tc-99m comparison and the degrees of equivalence with the key comparison reference value and between the present IFIN-HH result, the other K4 participants and the six participants in the K1 comparison have been evaluated.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
