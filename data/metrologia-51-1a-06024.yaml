abstract:
- language: en
  script: Latn
  content: "<p>An indirect comparison of the standards for reference air kerma rate
    for 192Ir high dose rate brachytherapy sources of the National Physical Laboratory
    (NPL), United Kingdom, and of the Bureau International des Poids et Mesures (BIPM)
    was carried out at the NPL in June 2010. The comparison result, based on the calibration
    coefficients for a transfer standard and expressed as a ratio of the NPL and the
    BIPM standards for reference air kerma rate, is 0.9989 with a combined standard
    uncertainty of 0.0057. \n</p><p>Main text.\nTo reach the main text of this paper,
    click on . Note that this text is that which appears in Appendix B of the BIPM
    key comparison database .</p><p>The final report has been peer-reviewed and approved
    for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition
    Arrangement (CIPM MRA).</p>"
