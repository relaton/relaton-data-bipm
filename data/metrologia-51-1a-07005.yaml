abstract:
- language: en
  script: Latn
  content: |-
    <p>This report describes the bilateral key comparison CCM.P-K3.1 between the National Institute of Standards and Technology (NIST) and Physikalisch-Technische Bundesanstalt (PTB) for absolute pressure in the range from 3 × 10−6 Pa to 9 × 10−4 Pa.  This comparison was a follow-up to the comparison .  Two ionization gauges and two spinning rotor gauges (SRGs) were used as the transfer standards for the comparison.  The SRGs were used to compare the standards at a pressure of 9 × 10−4 Pa and to normalize the ionization gauge readings.  The two ionization gauges were used to compare the standards in the pressure range of from 3 × 10−6 Pa to 3 × 10−4 Pa.  Both laboratories used dynamic expansion chambers as standards in the comparison.  The two labs showed excellent agreement with each other and with the CCM.P-K3 key comparison reference value (KCRV) over the entire range.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
