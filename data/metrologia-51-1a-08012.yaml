abstract:
- language: en
  script: Latn
  content: |-
    <p>This report presents the results of APMP.QM-K41, a key comparison. This comparison is designed to test the capabilities of the NMIs to measure and certify hydrogen sulfide at a nominal amount fraction of 10 µmol/mol in nitrogen. This comparison provides an opportunity to the NMIs in APMP to submit supporting evidence for CMC at the same level as . The results from this comparison are linked with CCQM-K41.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
