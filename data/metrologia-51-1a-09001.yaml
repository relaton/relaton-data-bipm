abstract:
- language: en
  script: Latn
  content: |-
    <p>The CCAUV.U-K3 is the third key comparison in the ultrasound branch organised under the auspices of the Consultative Committee for Acoustics, Ultrasound and Vibration (CCAUV) of the BIPM. It is a follow-up to the first comparison , which dealt with power measurement in the frequency range 2 to 10.5 MHz and a power range between 10 mW and 15 W. This region is of particular importance for medical applications of ultrasound.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCAUV, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
