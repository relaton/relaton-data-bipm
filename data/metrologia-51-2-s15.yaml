abstract:
- script: Latn
  content: "Abstract<p>For the past two years, measurements have been performed with
    a watt balance at the National Institute of Standards and Technology (NIST) to
    determine the Planck constant. A detailed analysis of these measurements and their
    uncertainties has led to the value h = 6.626 069 79(30) × 10−34 J s. The relative
    standard uncertainty is 45 × 10−9. This result is 141 × 10−9 fractionally higher
    than h90. Here h90 is the conventional value of the Planck constant given by \n,
    where KJ-90 and RK-90 denote the conventional values of the Josephson and von
    Klitzing constants, respectively.</p>"
