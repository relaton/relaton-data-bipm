abstract:
- language: en
  script: Latn
  content: "<p>This report gives the result of a bilateral comparison of capacitance
    between the NSAI-NML (Ireland) and the BIPM carried out in 2011. Two 100 pF travelling
    standards belonging to the BIPM were used. The comparison was carried out with
    an 'A–B–A' pattern of measurements; the standards were measured first at the BIPM
    for a period of about one month, then for a similar period at the NSAI-NML, and
    finally again at the BIPM. The measurand was the two terminal-pair capacitance
    at a frequency of 1000 Hz, for a measuring voltage of 15 V. The BIPM was the pilot
    laboratory, and the comparison forms part of the ongoing BIPM key comparison BIPM.EM-K14.b.</p><p>\nThe
    results from the NSAI-NML and the BIPM were found to be in good agreement, with
    a difference smaller than the relative expanded uncertainty (95 % confidence,
    <em>k</em> = 2) of 0.66 × 10<sup>-6</sup>. \n</p><p>Main text.\nTo reach the main
    text of this paper, click on . Note that this text is that which appears in Appendix
    B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed
    and approved for publication by the CCEM, according to the provisions of the CIPM
    Mutual Recognition Arrangement (CIPM MRA).</p>"
