abstract:
- language: en
  script: Latn
  content: |-
    <p> As part of the ongoing BIPM key comparison BIPM.EM-K11.a and b, a comparison of the 1 V and 10 V voltage reference standards of the BIPM and the Service Métrologie—Metrologische Dienst (SMD), Brussel, Belgium, was carried out from October to November 2014. Two BIPM Zener diode-based travelling standards (Fluke 732B), BIPM_4 (Z4) and BIPM_5 (Z5), were transported by freight to SMD and also back to BIPM. At SMD, the reference standard for DC voltage is a Josephson Voltage Standard (JVS). The output EMF (Electromotive Force) of each travelling standard was measured by direct comparison with the primary standard.</p><p>At the BIPM, the travelling standards were calibrated, before and after the measurements at SMD, with the Josephson Voltage Standard. Results of all measurements were corrected for the dependence of the output voltages of the Zener standards on internal temperature and ambient atmospheric pressure.</p><p>The final result of the comparison is presented as the difference between the values assigned toDC voltage standards by SMD, at the level of 1.018 V and 10 V, at SMD, USMD, and those assigned by the BIPM, at the BIPM, UBIPM, at the reference date of 5 November 2014.</p><p> −  = 0.14 mV;   = 0.07 mV, at 1 V</p><p> −  = 0.09 mV;   = 0.49 mV , at 10 V</p><p>where uc is the combined standard uncertainty associated with the measured difference, including the uncertainty of the representation of the volt at the BIPM and at SMD, based on KJ-90, and the uncertainty related to the comparison.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCEM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
