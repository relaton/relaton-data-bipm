abstract:
- language: en
  script: Latn
  content: |-
    <p>This report gives the results of the EURAMET.PR-K1.a-2009 comparison of spectral irradiance over the wavelength range 250 nm—2500 nm. Seven laboratories took part, including the pilot. In general the results are consistent, with a few exceptions as explained in the report.
    </p><p>The EURAMET.PR-K1.a key comparison detailed in this report was carried out to establish the degrees of equivalence for the participating European laboratories with respect to the Key Comparison Reference Value (KCRV) of the CCPR-K1.a key comparison. The EURAMET.PR-K1.a key comparison was piloted by the National Physical Laboratory (NPL), who also acted as pilot for the CCPR-K1.a key comparison; a further linkage to the KCRV of the CCPR-K1.a key comparison was provided through the participation of the Physikalisch-Technische Bundesanstalt (PTB) in both comparisons. The other participants were: National Institute of Metrology of Romania (INM-RO), Federal Office of Metrology (METAS), VSL Dutch Metrology Institute (VSL), SP Technical Research Institute of Sweden (SP) and All Russian Institute for Optical and Physical Measurements (VNIIOFI).</p><p>Measurements were made by each laboratory at 44 designated wavelengths, or a subset of these wavelengths. The link laboratories made measurements at all 44 wavelengths. For the purposes of analysis each wavelength has been treated independently, as for the CCPR K1.a comparison.</p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCPR, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
