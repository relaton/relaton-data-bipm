abstract:
- language: en
  script: Latn
  content: "<p>The thickness of nickel layers were compared on steel samples. The
    measurand is the layer/coating thickness. In the case of area mass measurements
    the amount is given as layer thickness by using the reference value of the density
    of Ni (8.90 g/cm3 according to GOST 9.302-88).</p><p>\nFor nine reference materials
    that were used to compare the measurement standards of UNIIM and PTB, the En-factor
    is less than 1, which indicates that the measurement standards are equivalent
    in the range of coating thickness from 4 μm to 100 μm and surface density from
    40 g/m2 to 900 g/m2. But the comparison of the UNIIM and PTB measurement standards
    should be continued in the range of coating thickness from 1 μm to 5 μm. \n</p><p>Main
    text.\nTo reach the main text of this paper, click on . Note that this text is
    that which appears in Appendix B of the BIPM key comparison database .</p><p>The
    comparison was registered as the supplementary comparison EURAMET.L-S24. The final
    report has been peer-reviewed and approved for publication by the CCL WG-MRA,
    according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>"
