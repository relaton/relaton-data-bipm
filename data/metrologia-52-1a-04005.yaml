abstract:
- language: en
  script: Latn
  content: |-
    <p>Lasers from four national metrological institutes (NMIs) were compared in 2012 as part of the CCL-K11 ongoing key comparison, initiated by the 13th meeting of the Comité Consultative des Longuers (CCL) in 2007. The absolute frequency of R(127) 11-5 transitions of molecular iodine was measured for these lasers following the technical protocol for CCL-K11. The results of these measurements are compiled in this report. The comparison reports, as communicated by each participant, are included as appendices.</p><p>
    This document constitutes the fourth final report for the ongoing key comparison CCL-K11.
    </p><p>Main text.
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCL, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
