abstract:
- script: Latn
  content: 'Abstract<p>Nuclear counting is affected by pulse pileup and system dead
    time, which induce rate-related count loss and alter the statistical properties
    of the counting process. Fundamental equations are presented to predict deviations
    from Poisson statistics due to non-random count loss in nuclear counters and spectrometers.
    Throughput and dispersion of counts are studied for systems with pileup, extending
    and non-extending dead time, before and also after compensation for count loss.
    Equations are provided for random fractions of the output events, applicable to
    spectrometry applications. Methods for loss compensation are discussed, including
    inversion of the throughput equation, live-time counting and loss-free counting.
    Secondary effects in live-time counting are addressed: residual interference from
    pileup in systems with imposed dead times and errors due to varying count rate
    when measuring short-lived radionuclides.</p>'
