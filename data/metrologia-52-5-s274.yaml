abstract:
- script: Latn
  content: Abstract<p>We have determined the acoustic and microwave frequencies of
    a misaligned spherical resonator maintained near the temperature of the triple
    point of water and filled with helium with carefully characterized molar mass  g mol<sup>−1</sup>,
    with a relative standard uncertainty . From these data and traceable thermometry
    we estimate the speed of sound in our sample of helium at  K and zero pressure
    to be  m<sup>2</sup> s<sup>−2</sup> and correspondingly deduce the value  J mol<sup>−1</sup> K<sup>−1</sup>
    for the molar gas constant. We estimate the value  J K<sup>−1</sup> for the Boltzmann
    constant using the currently accepted value of the Avogadro constant <em>N</em><sub>A</sub>.
    These estimates of <em>R</em> and <em>k</em>, with a relative standard uncertainty
    of 1.06  ×  10<sup>−6</sup>, are 1.47 parts in 10<sup>6</sup> above the values
    recommended by CODATA in 2010.</p>
