abstract:
- script: Latn
  content: 'Abstract<p>We determined accurate values of <em>ratios</em> among the
    average molar masses <em>M</em><sub>Ar</sub> of 9 argon samples using two completely-independent
    techniques: (1) mass spectrometry and (2) measured ratios of acoustic resonance
    frequencies. The two techniques yielded mutually consistent ratios (RMS deviation
    of 0.16   ×   10<sup>−6</sup> <em>M</em><sub>Ar</sub> from the expected correlation)
    for the 9 samples of highly-purified, commercially-purchased argon with values
    of <em>M</em><sub>Ar</sub> spanning a range of 2   ×   10<sup>−6</sup> <em>M</em><sub>Ar</sub>.
    Among the 9 argon samples, two were traceable to recent, accurate, argon-based
    measurements of the Boltzmann constant <em>k</em><sub>B</sub> using primary acoustic
    gas thermometers (AGT). Additionally we determined our absolute values of <em>M</em><sub>Ar</sub>
    traceable to two, completely-independent, isotopic-reference standards; one standard
    was prepared gravimetrically at KRISS in 2006; the other standard was isotopically-enriched
    <sup>40</sup>Ar that was used during NIST’s 1988 measurement of <em>k</em><sub>B</sub>
    and was sent to NIM for this research. The <em>absolute</em> values of <em>M</em><sub>Ar</sub>
    determined using the KRISS standard have the relative standard uncertainty <em>u</em><sub>r</sub>(<em>M</em><sub>Ar</sub>)  =  0.70   ×   10<sup>−6</sup>
    (Uncertainties here are one standard uncertainty.); they agree with values of
    <em>M</em><sub>Ar</sub> determined at NIM using an AGT within the uncertainty
    of the comparison <em>u</em><sub>r</sub>(<em>M</em><sub>Ar</sub>)  =  0.93   ×   10<sup>−6</sup>.
    If our measurements of <em>M</em><sub>Ar</sub> are accepted, the difference between
    two, recent, argon-based, AGT measurements of <em>k</em><sub>B</sub> decreases
    from (2.77   ±   1.43)  ×  10<sup>−6</sup> <em>k</em><sub>B</sub> to (0.16   ±   1.28)  ×  10<sup>−6</sup>
    <em>k</em><sub>B</sub>. This decrease enables the calculation of a <em>meaningful</em>,
    weighted average value of <em>k</em><sub>B</sub> with a uncertainty <em>u</em><sub>r</sub>(<em>k</em><sub>B</sub>)  ≈  0.6   ×   10<sup>−6</sup>.</p>'
