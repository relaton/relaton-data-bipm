abstract:
- language: en
  script: Latn
  content: "<p/><p>As part of the ongoing BIPM key comparison BIPM.EM-K11.a and b,
    a comparison of the 1 V and 10 V voltage reference standards of the BIPM and the
    Laboratoire de Métrologie Electrique, DEFNAT (Tunisia), was carried out from February
    to March 2016. Two BIPM Zener diode-based travelling standards (Fluke 732B), BIPM_C
    (ZC) and BIPM_6 (Z6), were transported by freight to DEFNAT and back to BIPM.
    In order to keep the Zeners powered during their transportation phase, a BIPM
    in-house voltage stabiliser was connected in parallel to the internal battery.
    The voltage stabiliser consists of a set of two batteries, electrically protected
    from surcharge-discharge, easy to recharge and is designed to power two transfer
    standards for 10 consecutive days. At DEFNAT, the reference standard for DC voltage
    is a Josephson Voltage Standard. The output EMF (Electromotive Force) of each
    travelling standard was measured by direct comparison with the primary standard.</p><p>At
    the BIPM, the travelling standards were calibrated, before and after the measurements
    at DEFNAT, with the Josephson Voltage Standard. Results of all measurements were
    corrected for the dependence of the output voltages of the Zener standards on
    internal temperature and ambient atmospheric pressure.</p><p>The final result
    of the comparison is presented as the difference between the values assigned to
    DC voltage standards by DEFNAT, at the level of 1.018 V and 10 V, at DEFNAT, U\n
    \              DEFNAT, and those assigned by the BIPM, at the BIPM, U\n               BIPM,
    at the reference date of the 26th of February 2016.</p><p>\n               U\n
    \              DEFNAT - U\n               BIPM = + 0.07 μV; \tu\n               c
    = 0.04 μV, at 1.018 V</p><p>\n               U\n               DEFNAT - U\n               BIPM
    = + 0.38 μV; \tu\n               c = 0.10 μV, at 10 V</p><p>where u\n               c
    is the combined standard uncertainty associated with the measured difference,
    including the uncertainty of the representation of the volt at the BIPM and at
    NSAI-NML, based on KJ-90, and the uncertainty related to the comparison.</p><p/><p>Main
    text</p><p>\nTo reach the main text of this paper, click on . Note that this text
    is that which appears in Appendix B of the BIPM key comparison database .</p><p>The
    final report has been peer-reviewed and approved for publication by the CCEM,
    according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>"
