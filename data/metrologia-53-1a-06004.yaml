abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>Since 2001, six national metrology institutes (NMI) have submitted seven samples of known activity of 18F to the International Reference System (SIR) for activity comparison at the Bureau International des Poids et Mesures (BIPM), with comparison identifier BIPM.RI(II)-K1.F-18. The values of the activity submitted were between about 1 MBq and 18 MBq. The primary standardization result for the LNE-LNHB, France, replaces their earlier result of 2002 and the key comparison reference value (KCRV) has been recalculated. In the frame of the BIPM.RI(II)-K4.F18 comparison, the NPL updated their result in the KCDB. Consequently there are now five results in the BIPM.RI(II)-K1.F-18 comparison. The degrees of equivalence between each equivalent activity measured in the SIR and the updated KCRV have been calculated and the results are given in the form of a table. A graphical presentation is also given.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
