abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>A key comparison has been made between the air-kerma standards of the CMI, Czech Republic and the BIPM in the low-energy x-ray range. The results show the standards to be in agreement at around the level of the standard uncertainty of the comparison of 3.5 parts in 103. The results are analysed and presented in terms of degrees of equivalence, suitable for entry in the BIPM key comparison database.</p><p/><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
