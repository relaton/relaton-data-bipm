abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>Since 1975, seven national metrology institutes (NMI) have submitted eleven samples of known activity of 113Sn to the International Reference System (SIR) for activity comparison at the Bureau International des Poids et Mesures (BIPM), with comparison identifier BIPM.RI(II)-K1.Sn-113. The values of the activity submitted were between about 0.7 MBq and 22 MBq. The present primary standardization results for the PTB, Germany and the LNE-LNHB, France, replace their earlier results of 1989 and 1992, respectively. A key comparison reference value (KCRV) has been evaluated for the first time for 113Sn. There are only three results remaining in the BIPM.RI(II)-K1.Sn-113 comparison, all the previously published ones being outdated. The degrees of equivalence between each of these three equivalent activities measured in the SIR and the KCRV have been calculated and the results are given in the form of a table. A graphical presentation is also given.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
