abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>This report summarizes the results of a SIM comparison of a 1 kg mass standard carried out by 7 NMIs. The results reported by the participants are consistent with each other and they can be linked to the comparison CCM.M-K4 with satisfactory degrees of equivalence.</p><p>Main text</p><p>
