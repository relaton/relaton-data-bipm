abstract:
- language: en
  script: Latn
  content: "<p/><p>Dimethyl sulfide (DMS) is an important compound in monitoring climate
    change and is monitored by the World Meteorological Organization Global Atmospheric
    Watch Volatile Organic Compounds (WMO-GAW VOC) program at several monitoring sites.
    It is essential that measurement results are accurate and consistent among the
    assigned values for primary gas mixtures to meet the WMO requirement. The purpose
    of this comparison is to compare the measurement capability of DMS at approximately
    10 μ­mol/mol and expectation to contribute the establishment of traceability to
    single measurement scale for DMS between NMIs.</p><p>Main text</p><p>To reach
    the main text of this paper, click on . Note that this text is that which appears
    in Appendix B of the BIPM key comparison database .</p><p>The final report has
    been peer-reviewed and approved for publication by the CCQM, according to the
    provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>"
