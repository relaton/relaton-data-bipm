abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>The relevance of the COOMET.QM-S5 comparison is founded on tightening of requirements to a control of automobile emissions (realization of environmental standards of EURO 4, EURO-5). Participating laboratories: VNIIM, BAM, BelGIM, Ukrmetrteststandart, KazInMetr. This comparison was carried out in 2013-2014. This supplementary comparison supports CMC claims for: CO2 in the range (4–16) · 10−2 mol/mol; CO in the range (0.5–5) · 10−2 mol/mol; C3H8 in the range (0.01–0.3) · 10−2 mol/mol. Results:</p><p>
                   Component CO:
                </p><p>All laboratories identified the values of carbon monoxide mole fraction in the gas mixture within ±0.9134%.</p><p>
                   Component CO:
                </p><p>All laboratories identified the values of carbon dioxide mole fraction in the gas mixture within ±0.3042%.</p><p>
                   Component CH:
                </p><p>All laboratories identified the values of propane mole fraction in the gas mixture within ±0.443%.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
