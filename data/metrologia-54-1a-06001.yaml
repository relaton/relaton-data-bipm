abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>In 2015, comparisons of activity measurements of 18F and 99mTc using the Transfer Instrument of the International Reference System (SIRTI) took place at the National Metrology Institute of South Africa (NMISA, South Africa). Ampoules containing about 25 kBq of 18F and 99mTc solutions were measured in the SIRTI for more than two half-lives. The NMISA standardized the activity in the ampoules by ionization chamber measurements traceable to 4π(LS)β–γ coincidence measurements. The comparisons, identifiers BIPM.RI(II)-K4.F-18 and BIPM.RI(II)-K4.Tc-99m, are linked to the corresponding BIPM.RI(II)-K1.F-18 and BIPM.RI(II)-K1.Tc-99m comparisons and degrees of equivalence with the respective key comparison reference values have been evaluated.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
