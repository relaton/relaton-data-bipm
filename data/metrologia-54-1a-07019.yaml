abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>Twelve absolute gravimeters were compared during the regional Key Comparison SIM.M.G-K1 of absolute gravimeters. The four gravimeters were from different NMIs and DIs. The comparison was linked to the CCM.G-K2 through EURAMET.M.G-K2 via the DI gravimeter FG5X-216. Overall, the results and uncertainties indicate an excellent agreement among the gravimeters, with a standard deviation of the gravimeters' DoEs better than 1.3 μGal. In the case of the official solution, all the gravimeters are in equivalence well within the declared uncertainties.</p><p/><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
