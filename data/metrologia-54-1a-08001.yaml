  content: |-
    <p/><p>This article presents the report on the COOMET supplementary comparison "Atmospheric air pollutants: CO in Nitrogen, 5 μmol/mol".</p><p>Carbon monoxide (CO) is present in atmosphere due to different natural and anthropogenic sources. CO is a toxic gas and in concentrations higher than (3-5) μmol/mol it is hazardous to human health.</p><p>Main text</p><p>
