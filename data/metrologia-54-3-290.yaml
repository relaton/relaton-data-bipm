abstract:
- script: Latn
  content: Abstract<p>We report the results of a recent measurement of the absolute
    frequency of the – transition of the  ion. The optical frequency was measured
    against the international atomic time realization of the SI second on the geoid
    as obtained by frequency transfer using a global positioning system link and the
    precise point positioning technique. The measurement campaign yielded more than
    100 h of frequency data. It was performed with improvements to the stability and
    accuracy of the single-ion clock compared to the last measurement made in 2012.
    The single ion clock uncertainty is evaluated at  when contributions from acousto-optic
    modulator frequency chirps and servo errors are taken into account. The stability
    of the ion clock is  at 1 s averaging, a factor of three better than in the previous
    measurement. The results from the two measurement campaigns are in good agreement.
    The uncertainty of the measurement, primarily from the link to the SI second,
    is 0.75 Hz (). The frequency measured for the S–D clock transition of  is   Hz.</p>
