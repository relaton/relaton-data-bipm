abstract:
- script: Latn
  content: Abstract<p>We report a new determination of the Boltzmann constant <em>k</em><sub>B</sub>
    using a cylindrical acoustic gas thermometer. We determined the length of the
    copper cavity from measurements of its microwave resonance frequencies. This contrasts
    with our previous work (Zhang <em>et al</em> 2011 <em>Int. J. Thermophys</em>.
    32 1297, Lin <em>et al</em> 2013 <em>Metrologia</em> 50 417, Feng <em>et al</em>
    2015 <em>Metrologia</em> 52 S343) that determined the length of a different cavity
    using two-color optical interferometry. In this new study, the half-widths of
    the acoustic resonances are closer to their theoretical values than in our previous
    work. Despite significant changes in resonator design and the way in which the
    cylinder length is determined, the value of <em>k</em><sub>B</sub> is substantially
    unchanged. We combined this result with our four previous results to calculate
    a global weighted mean of our <em>k</em><sub>B</sub> determinations. The calculation
    follows CODATA’s method (Mohr and Taylor 2000 <em>Rev. Mod. Phys</em>. 72 351)
    for obtaining the weighted mean value of <em>k</em><sub>B</sub> that accounts
    for the correlations among the measured quantities in this work and in our four
    previous determinations of <em>k</em><sub>B</sub>. The weighted mean  is 1.380 6484(28)  ×  10<sup>−23</sup>
    J K<sup>−1</sup> with the relative standard uncertainty of 2.0  ×  10<sup>−6</sup>.
    The corresponding value of the universal gas constant is 8.314 459(17) J K<sup>−1</sup>
    mol<sup>−1</sup> with the relative standard uncertainty of 2.0  ×  10<sup>−6</sup>.</p>
