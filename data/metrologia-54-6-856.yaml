abstract:
- script: Latn
  content: Abstract<p>The SI unit of temperature will soon be redefined in terms of
    a fixed value of the Boltzmann constant <em>k</em> derived from an ensemble of
    measurements worldwide. We report on a new determination of <em>k</em> using acoustic
    thermometry of helium-4 gas in a 3 l volume quasi-spherical resonator. The method
    is based on the accurate determination of acoustic and microwave resonances to
    measure the speed of sound at different pressures. We find for the universal gas
    constant <em>R</em>  =  8.314 4614(50) J·mol<sup>−1</sup>·K<sup>−1</sup>. Using
    the current best available value of the Avogadro constant, we obtain <em>k</em>  =  1.380 648 78(83)  ×  10<sup>−23</sup>
    J·K<sup>−1</sup> with <em>u</em>(<em>k</em>)/<em>k</em>  =  0.60  ×  10<sup>−6</sup>,
    where the uncertainty <em>u</em> is one standard uncertainty corresponding to
    a 68% confidence level. This value is consistent with our previous determinations
    and with that of the 2014 CODATA adjustment of the fundamental constants (Mohr
    <em>et al</em> 2016 <em>Rev. Mod. Phys</em>. 88 035009), within the standard uncertainties.
    We combined the present values of <em>k</em> and <em>u</em>(<em>k</em>) with earlier
    values that were measured at LNE. Assuming the maximum possible correlations between
    the measurements, (<em>k</em><sub>present</sub>/〈<em>k</em>〉  −  1)  =  0.07  ×  10<sup>−6</sup>
    and the combined <em>u</em><sub/>(<em>k</em>) is reduced to 0.56  ×  10<sup>−6</sup>.
    Assuming minimum correlations, (<em>k</em><sub>present</sub>/〈<em>k</em>〉  −  1)  =  0.10  ×  10<sup>−6</sup>
    and the combined <em>u</em><sub/>(<em>k</em>) is reduced to 0.48  ×  10<sup>−6</sup>.</p>
