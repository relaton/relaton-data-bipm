abstract:
- script: Latn
  content: Abstract<p>In precision metrology, the determination of the Newtonian gravity
    constant <em>G</em> represents a real problem, since its history is plagued by
    huge unknown discrepancies between a large number of independent experiments.
    In this paper, we propose a novel experimental setup for measuring <em>G</em>
    with a relative accuracy of , using a standard cold atomic fountain and matter
    wave interferometry. We discuss in detail the major sources of systematic errors,
    and provide the expected statistical uncertainty. The feasibility of determining
    <em>G</em> at the  level is also discussed.</p>
