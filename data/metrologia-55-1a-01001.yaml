abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>As part of the ongoing BIPM key comparison BIPM.EM-K11.a and b, a comparison of the 1.018 V and 10 V voltage reference standards of the BIPM and the National Metrology Institute of South Africa, NMISA (South Africa), was carried out from April to June 2017. Two BIPM Zener diode-based travelling standards (Fluke 732B), BIPM_A (ZA) and BIPM_B (ZB), were transported by freight to NMISA and back to BIPM. In order to keep the Zeners powered during their transportation phase, a voltage stabilizer developed by BIPM was connected in parallel to the internal battery. It consists of a set of two batteries, electrically protected from surcharge-discharge, easy to recharge and is designed to power two transfer standards for ten consecutive days. At NMISA, the reference standard for DC voltage is a Josephson Voltage Standard. The output EMF (Electromotive Force) of each travelling standard was measured by direct comparison with the primary standard.</p><p>At the BIPM, the travelling standards were calibrated, before and after the measurements at NMISA, with the Josephson Voltage Standard. Results of all measurements were corrected for the dependence of the output voltages of the Zener standards on internal temperature and atmospheric pressure.</p><p>The final result of the comparison is presented as the difference between the values assigned to DC voltage standards by NMISA, at the level of 1.018 V and 10 V, at NMISA, <em>U</em>
                   <sub>NMISA</sub>, and those assigned by the BIPM, at the BIPM, <em>U</em>
                   <sub>BIPM</sub>, at the reference dates of the 19<sup>th</sup> and 18<sup>th</sup> of May 2017, respectively.</p><p>
                   <em>U</em>
                   <sub>NMISA</sub> − <em>U</em>
                   <sub>BIPM</sub> = + 0.07 μV; <em>u</em>
                   <sub>c</sub> = 0.02 μV, at 1.018 V</p><p>
                   <em>U</em>
                   <sub>NMISA</sub> − <em>U</em>
                   <sub>BIPM</sub> = + 0.001 μV; <em>u</em>
                   <sub>c</sub> = 0.34 μV, at 10 V</p><p>where <em>u</em>
                   <sub>c</sub> is the combined standard uncertainty associated with the measured difference, including the uncertainty of the representation of the volt at the BIPM and at NMISA, based on <em>K</em>
                   <sub>J-90</sub>, and the uncertainty related to the comparison.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCEM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
