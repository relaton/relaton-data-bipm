abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>This report describes the measurement procedures and participant results for the EURAMET project 658 extension—'project to examine underlying parameters in radiance temperature scale realisation from 156 °C to 1000 °C', with particular emphasis on the results of the variable temperature and fixed point blackbody measurements for the justification of radiation thermometry CMCs.</p><p>Main text</p><p>
