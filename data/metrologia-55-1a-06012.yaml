abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>A key comparison of the standards for absorbed dose to water of the VSL, Dutch Metrology Institute, Delft, The Netherlands and of the Bureau International des Poids et Mesures (BIPM) was carried out in the 60Co radiation beam of the BIPM in December 2017. The comparison result, based on the calibration coefficients for two transfer standards and expressed as a ratio of the VSL and the BIPM standards for absorbed dose to water, is 0.9960 with a combined standard uncertainty of 4.8 x 10-3. The results are analysed and presented in terms of degrees of equivalence, suitable for entry in the BIPM key comparison database.</p><p>KEY WORDS FOR SEARCH</p><p>Absorbed dose to water, 60Co, key comparison, radiation dosimetry</p><p/><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
