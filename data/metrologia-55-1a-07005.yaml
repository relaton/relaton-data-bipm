abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>Bilateral comparison was organized between the laboratory for process measurement of the Croatian Metrology Institute (HMI/FSB-LPM) and the pressure laboratory of the Directorate of Measures and Precious Metals of the Republic of Serbia (DMDM). Laboratory for process measurement of HMI acted as the pilot laboratory. The aim of the comparison was to evaluate the degree of equivalence in the determination of effective area and elastic distortion coefficient, considering respective uncertainties of the two laboratories. Measurements were done on the pressure balance in gauge mode, with oil as transmitting medium, in the gauge pressure range 10–80 MPa. The results of the comparison successfully demonstrated that the hydraulic gauge pressure standards are equivalent within their claimed uncertainties.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
