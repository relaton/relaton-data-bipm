abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>Liquefied hydrocarbon mixtures with traceable composition are required in order to underpin measurements of the composition and other physical properties of LPG (liquefied petroleum gas), thus meeting the needs of an increasingly large industrial market.</p><p>This comparison aims to assess the analytical capabilities of laboratories for measuring the composition of a Liquid Petroleum Gas (LPG) mixture when sampled in the liquid phase from a Constant Pressure Cylinder. Mixtures contained ethane, propane, propene, i-butane, n-butane, but-1-ene and i-pentane with nominal amount fractions of 2, 71, 9, 4, 10, 3 and 1 cmol mol−1 respectively.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
