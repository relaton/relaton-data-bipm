abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>This document describes the result of a key comparison for propane in nitrogen. The nominal amount-of-substance fraction of propane is 1000 μmol/mol. The comparison aimed to assess the measurement capability of participants in gas analysis. Nine NMIs or DIs participated in the comparison.</p><p>CERI participated in a key comparison CCQM-K111—propane in nitrogen, and coordinated this key comparison. Therefore, every participants' results of this comparison are linking to the CCQM-K111.</p><p>Gravimetric values of the samples were used as key comparison reference values (KCRVs).</p><p>Measured values of eight participants were within ± 0.25 % of the KCRVs.</p><p>Many participants reported purity or impurity analysis of materials. These results are also able to assess the participants' capability of the analysis.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
