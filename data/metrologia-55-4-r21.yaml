abstract:
- script: Latn
  content: 'Abstract<p>Following the recommendations of ICRU Report 90, a re-evaluation
    has been made of the BIPM standards for air kerma in x-rays and in <sup>60</sup>Co
    and <sup>137</sup>Cs <em>γ</em>-radiations, for absorbed dose to water in <sup>60</sup>Co
    <em>γ</em>-radiation and for reference air-kerma rate in <sup>192</sup>Ir <em>γ</em>-radiation
    for brachytherapy. The changes arise from three sources: (i) the implementation
    of new correction factors <em>k</em><sub>ii</sub> and <em>k</em><sub>W</sub> for
    free-air ionization chambers; (ii) a re-evaluation of the mean excitation energy
    for graphite and water and the density effect for graphite; (iii) new stated uncertainties
    for the value of <em>W</em><sub>air</sub> for dry air and for the related product
    <em>W</em><sub>air</sub><em>s</em><sub>g,air</sub>. Consideration has also been
    given to new recommendations for photon interaction coefficients, although no
    corresponding changes have resulted. The heat defect in graphite is also considered.
    A summary table of the combined effect of these changes is presented. The new
    standards will be implemented on 1 January 2019.</p>'
