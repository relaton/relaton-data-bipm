abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>A key comparison of DC voltage at 10 V and 1.018 V has been conducted from 2013 to 2014 between NMIJ, CMS and KRISS. In this comparison, PJVS systems were compared via Zener travelling standards. All the results agree well to the key comparison reference values, which are provided by a conventional JVS system at KRISS, within 1 part in 107 for 10 V and 2 parts in 107 for 1.018 V, respectively.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCEM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
