abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>A key comparison has been carried out of the absorbed dose to water standards of the Federal Institute of Metrology (METAS), Switzerland, and the BIPM in accelerator photon beams. The results show the standards to be in agreement within the standard uncertainty of the comparison of 6.6 parts in 103. The results are analysed and presented in terms of degrees of equivalence, suitable for entry in the BIPM key comparison database.</p><p>KEY WORDS FOR SEARCH</p><p>Ionizing radiation, dosimetry, key comparison, absorbed dose to water</p><p/><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
