abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>CCQM-K120.a comparison involves preparing standards of carbon dioxide in air which are fit for purpose for the atmospheric monitoring community, with stringent requirements on matrix composition and measurement uncertainty of the CO<sub>2</sub> mole fraction. This represents an analytical challenge and is therefore considered as a Track C comparison. The comparison will underpin CMC claims for CO<sub>2</sub> in air for standards and calibrations services for the atmospheric monitoring community, matrix matched to real air, over the mole fraction range of 250 μmol/mol to 520 μmol/mol.</p><p>CCQM-K120.b comparison tests core skills and competencies required in gravimetric preparation, analytical certification and purity analysis. It is considered as a Track A comparison. It will underpin CO<sub>2</sub> in air and nitrogen claims in a mole fraction range starting at the smallest participant's reported expanded uncertainty and ending at 500 mmol/mol. Participants successful in this comparison may use their result in the flexible scheme and underpin claims for all core mixtures</p><p>This study has involved a comparison at the BIPM of a suite of 44 gas standards prepared by each of the participating laboratories. Fourteen laboratories took part in both comparisons (CCQM-K120.a, CCQM-K120.b) and just one solely in the CCQM-K120.b comparison.</p><p>The standards were sent to the BIPM where the comparison measurements were performed. Two measurement methods were used to compare the standards, to ensure no measurement method dependant bias: GC-FID and FTIR spectroscopic analysis corrected for isotopic variation in the CO<sub>2</sub> gases, measured at the BIPM using absorption laser spectroscopy. Following the advice of the CCQM Gas Analysis Working Group, results from the FTIR method were used to calculate the key comparison reference values.</p><p>KEY WORDS FOR SEARCH</p><p>FTIR, CO2, GC-FID, Carbon dioxide at background level, Carbon dioxide at urban level, Delta Ray, CO2 gas standards</p><p/><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCQM, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
