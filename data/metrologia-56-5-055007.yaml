  content: Abstract<p>We examine the  test for binned, Gaussian samples, including
    effects due to the fact that the experimentally available sample standard deviation
    and the unavailable true standard deviation have different statistical properties.
    For data formed by binning Gaussian samples with bin size <em>n</em>, we find
    that the expected value and standard deviation of the reduced  statistic is</p><p/><p>where
    <em>N</em> is the total number of binned values. This is strictly larger in both
    mean and standard deviation than the value of  reported in standard treatments,
    which ignore the distinction between true and sample standard deviation.</p>
