abstract:
- language: en
  script: Latn
  content: |-
    <p/><p>A key comparison has been made between the absorbed dose to water standards of the LNE-LNHB, France, and the BIPM in the medium-energy x-ray range. The results show the standards to be in general agreement at the level of the expanded (<em>k</em> = 2) uncertainty of the comparison of 2 parts in 10<sup>2</sup>. The results are presented in terms of degrees of equivalence for entry in the BIPM key comparison database.</p><p>Main text</p><p>
    To reach the main text of this paper, click on . Note that this text is that which appears in Appendix B of the BIPM key comparison database .</p><p>The final report has been peer-reviewed and approved for publication by the CCRI, according to the provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
