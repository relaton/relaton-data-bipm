abstract:
- script: Latn
  content: 'Abstract<p>A generalized marginal random effects model is described that
    enables exact Bayesian inference using either the Jeffreys or Berger-Bernardo
    non-informative prior distributions without the need for Markov Chain Monte Carlo
    sampling, requiring only numerical integrations. This contribution focuses on
    inference for the heterogeneity parameter, often called “dark uncertainty” and
    denoted <em>τ</em> in this contribution. The proposed models are used for consensus
    building in meta-analyses of measurement results for the Newtonian constant of
    gravitation, <em>G</em>, and for the effectiveness of anti-retroviral pre-exposure
    prophylaxis in preventing HIV infection.</p><p>The estimates of <em>τ</em> that
    seventeen alternative different methods produce, including those that we propose,
    were also compared. The relative impact (gauged in terms of the ratio of the range
    of estimates to their median) that model choice had on the estimate of <em>τ</em>
    was very substantial: 79 % for <em>G</em> and 87 % for HIV prophylaxis. For <em>G</em>,
    the estimates of <em>τ</em> ranged from  to . For <em>Truvada</em> they ranged
    from 0.49 to 0.92.</p><p>Since the estimate of <em>τ</em> impacts the quality
    of the estimate of the measurand substantially, we recommend the Bayesian approaches
    to estimate <em>τ</em> because they take the whole posterior distribution of <em>τ</em>
    into account, hence the corresponding uncertainty, rather than using a single
    value and pretending that it is known with certainty.</p><p>In the case of the
    measurement results for <em>G</em>, we found that the model with Student’s <em>t</em>
    random effects and the Jeffreys prior provides the best fit, while for the <em>Truvada</em>
    data the normal marginal random effects model, also with Jeffreys prior, produces
    an estimate of <em>τ</em> closest to classical estimators like DerSimonian-Laird,
    but offers the advantage of recognizing and propagating the uncertainty associated
    with <em>τ</em>, which the classical procedures ignore.</p>'
