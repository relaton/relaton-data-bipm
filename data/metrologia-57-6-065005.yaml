abstract:
- script: Latn
  content: 'Abstract<p>Several correction factors for two new reference beta-particle
    radiation fields complementing ISO 6980 have been measured and calculated for
    both primary beta dosimetry and the operational quantities in radiation protection.
    The following correction factors for primary beta dosimetry for the determination
    of the absorbed dose to tissue, <em>D</em><sub>t</sub>, have been determined by
    calculations: <em>k</em><sub>ba</sub> for backscatter from the collecting electrode,
    <em>k</em><sub>pe</sub> for perturbation by the chamber’s side walls, <em>k</em><sub>ih</sub>
    for inhomogeneity inside the collecting volume, <em>k</em><sub>Sta</sub> for the
    stopping power ratio at different phantom depths, and <em>k</em><sub>SA</sub>
    for the use of the Spencer-Attix theory, while the following have been measured:
    <em>k</em><sub>br</sub> for the effect of bremsstrahlung and <em>k</em><sub>abs</sub>
    for variations in the attenuation and scattering of beta particles between the
    source and the collecting volume due to variations from reference conditions and
    for differences of the entrance window to a tissue-equivalent thickness of 0.07
    mm. Furthermore, calculations were undertaken to determine the following correction
    factors to assess the operational quantities <em>H</em><sub>p</sub>(0.07), <em>H</em><sub>p</sub>(3),
    <em>H′</em>(0.07), and <em>H′</em>(3): <em>k</em><sub>rod</sub>(0.07) for the
    rod instead of the slab phantom, <em>k</em><sub>cyl</sub>(3) for the cylinder
    instead of the slab phantom, as well as <em>k′</em>(0.07) and <em>k′</em>(3) for
    the ICRU sphere instead of the slab phantom, while the correction factor for oblique
    radiation incidence has been measured. The newly determined correction factors
    were determined in the same way as those for several well-established beta-particle
    radiation fields described in two earlier publications by the author. Furthermore,
    they are ready to be implemented in an updated version of the ISO 6980 series
    and in the software of the Beta Secondary Standard BSS 2.</p>'
