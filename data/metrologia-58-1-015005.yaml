abstract:
- script: Latn
  content: Abstract<p>We report direct measurements of the frequency ratio of the
    642 THz  electric octupole transition in 171Yb+ and the 429 THz  transition in
    87Sr. A series of 107 measurements has been performed at the Physikalisch-Technische
    Bundesanstalt between December 2012 and October 2019. Long-term variations of
    the ratio are larger than expected from the individual measurement uncertainties
    of few 10−17. The cause of these variations remains unknown. Even taking these
    into account, we find a fractional uncertainty of the frequency ratio of 2.5 ×
    10−17, which improves upon previous knowledge by one order of magnitude. The average
    frequency ratio is . This represents one of the most accurate measurements between
    two different atomic species to date.</p>
