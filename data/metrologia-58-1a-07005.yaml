abstract:
- script: Latn
  content: Main text<p>In order to demonstrate the equivalence in calibration of 500
    kg mass standard, a supplementary comparison has been carried out by 20 members
    of EURAMET. The overall result shows a good consistency among the participants.</p><p>To
    reach the main text of this paper, click on . Note that this text is that which
    appears in Appendix B of the BIPM key comparison database .</p><p>The final report
    has been peer-reviewed and approved for publication by the CCM, according to the
    provisions of the CIPM Mutual Recognition Arrangement (CIPM MRA).</p>
