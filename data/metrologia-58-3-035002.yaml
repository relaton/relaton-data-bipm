abstract:
- script: Latn
  content: "Abstract<p>In the present work, we have deduced the fluorescence (<em>ω</em>\n
    \              <sub>1</sub>, <em>ω</em>\n               <sub>2</sub>, <em>ω</em>\n
    \              <sub>3</sub>) and Coster–Kronig (CK)(<em>f</em>\n               <sub>12</sub>,
    <em>f</em>\n               <sub>13</sub>, <em>f</em>\n               <sub>23</sub>)
    yields for Sn (<em>Z</em> = 50) and Sb (<em>Z</em> = 51) from the L<sub>\n                  \n
    \              </sub> (<em>i</em> = 1–3) sub-shell x-ray intensities measured
    using the energy tunable synchrotron radiation employing the selective photoionization
    method. For both the elements, yields have been obtained using two sets of theoretical
    photoionization cross sections based on the non-relativistic Hartree–Fock–Slater
    (HFS) model and the self-consistent Dirac–Hartree–Fock (DHF) model. In case of
    Sb, we have obtained a third set of measured yields also by using the experimental
    photoionization cross sections evaluated from independent measurements of the
    mass-attenuation coefficients. The experimental yields for Sb are reported for
    the first time by us. We have compared the present deduced fluorescence and CK
    yields with the Dirac–Hartree–Slater model based values, the semi-empirical values
    tabulated by Krause and the earlier reported values. In case of Sn, using the
    DHF and the HFS model based photoionization cross sections, two sets of present
    measured L<sub>1</sub> sub-shell fluorescence yields (<em>ω</em>\n               <sub>1</sub>)
    are found to be 0.039 ± 0.007 and 0.036 ± 0.003, and the CK yields (<em>f</em>\n
    \              <sub>13</sub>) are found to be 0.428 ± 0.107 and 0.405 ± 0.028,
    respectively. In case of Sb, using three sets of the photoionization cross sections
    (DHF, HFS and recent experimental values), the <em>ω</em>\n               <sub>1</sub>
    values are measured to be 0.042 ± 0.007, 0.040 ± 0.004 and 0.047 ± 0.005, and
    the CK yields are measured to be 0.343 ± 0.085, 0.297 ± 0.021 and 0.247 ± 0.022,
    respectively. The comparison of these present measured yields with the theoretical
    values provided a reliable experimental evidence indicating cut-off of the intense
    L<sub>1</sub>–L<sub>3</sub>M<sub>4,5</sub> CK transitions at <em>Z</em> = 50.</p>"
