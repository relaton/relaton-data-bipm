abstract:
- script: Latn
  content: "Abstract<p>We used absolute primary acoustic gas thermometry (AGT) to
    calibrate a Pt–Co resistance thermometer on the thermodynamic temperature scale
    by measuring the speed of sound in helium at a temperature <em>T</em>* chosen
    to be near the temperature of the triple point of neon, <em>T</em>\n               <sub>Ne</sub>.
    Prior to the present AGT, the Pt–Co thermometer was used with a neon triple-point
    cell as part of an interlaboratory comparison. Taken together, the results of
    the interlaboratory comparison and the present AGT redetermined the thermodynamic
    temperature <em>T</em>\n               <sub>Ne</sub> = (24.555 15 ± 0.000 24)
    K. This new value of <em>T</em>\n               <sub>Ne</sub> is consistent with
    other recent determinations obtained with various primary methods. After completing
    the AGT thermodynamic calibration, we used the Pt–Co thermometer to link <em>T</em>*
    to the temperature ratios measured by single-pressure refractive-index gas thermometry
    (SPRIGT) in a different laboratory. (Gao <em>et al</em> 2020 <em>Metrologia</em>
    \n               57 065006) Now, the <em>T</em>*-linked SPRIGT system can calibrate
    other thermometers on the thermodynamic temperature scale <em>T</em> in the range
    5 K ⩽ <em>T</em> ⩽ <em>T</em>\n               <sub>Ne</sub> without using the
    international temperature scale ITS-90. At most temperatures in this range, the
    uncertainties of the <em>T</em>*-linked SPRIGT system are smaller than those of
    the ITS-90 systems used by National Metrology Institutes to calibrate resistance
    thermometers.</p>"
