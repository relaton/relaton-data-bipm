abstract:
- script: Latn
  content: Abstract<p>We demonstrate operation of a constant-pressure flowmeter capable
    of generating and accurately measuring flows as low as 2 × 10<sup>−13</sup> mol s<sup>−1</sup>.
    Generation of such small flows is accomplished by using a small conductance element
    with <em>C</em> ≈ 50 nl s<sup>−1</sup>. Accurate measurement then requires both
    low outgassing materials ( mol s<sup>−1</sup>) and small volume changes ( μl).
    We outline the present flowmeter’s construction, detail its operation, and quantify
    its uncertainty. The type-B uncertainty is % (<em>k</em> = 1) over the entire
    operating range. In particular, we present an analysis of its hydraulic system,
    and quantify the shift and uncertainty due to the slightly compressible oil. Finally,
    we compare our flowmeter against a NIST standard flowmeter, and find agreement
    to within 0.5% (<em>k</em> = 2).</p>
