abstract:
- script: Latn
  content: Abstract<p>We report on an improved absolute frequency measurement of the
    – optical transition of a single trapped strontium ion using a Global Positioning
    System (GPS) link to the SI second. Compared to our previous measurement, the
    systematic uncertainty of the optical clock has been reduced from  to . The measurement
    campaign was performed over a two-week period in June 2017, with a total measurement
    time of 92 h. The traceability to the SI second through International Atomic Time
    was achieved through a GPS link using the Precise Point Positioning method. The
    dead time uncertainty of the link between the optical clock and the maser was
    evaluated using standard methods based on a model of the maser noise and on the
    optical frequency measurement uptimes. The measured frequency of the <sup>88</sup>Sr<sup>+</sup>
    ion – transition is  Hz. This result is in excellent agreement with our previous
    measurements and the uncertainty has been reduced by almost a factor of four,
    from a fractional frequency uncertainty of  to .</p>
