abstract:
- script: Latn
  content: Abstract<p>We report the absolute frequency measurement of the  transition
    in 87Sr optical lattice clock (Sr1) at National Time Service Center. Its systematic
    frequency shifts are evaluated carefully with a total relative uncertainty of
    . The measured absolute frequency is 429 228 004 229 872.91(18) Hz with a relative
    uncertainty of , with reference to the ensemble of primary and secondary frequency
    standards published in the Circular T bulletin by BIPM through a global navigation
    satellite system link.</p>
