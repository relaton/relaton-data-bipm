abstract:
- language: en
  script: Latn
  content: "<p>A new kind of atomic beam absolute frequency standard is proposed.
    The fine structure 3P0, m = 0 ↔ 3P1, m = 0 line of the Mg or Ca metastable triplet
    state is used as reference transition. The basic design features and the limiting
    factors are analyzed. The frequency stability is mainly limited by the second
    order Doppler effect and the estimated accuracy capability is better than 10-15,
    near the theoretical limit of a passive atomic beam device.</p>"
